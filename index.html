<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>FlowAI v3 — AI Workflow Builder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08080e;--s1:#0f0f1a;--s2:#141420;--s3:#1a1a28;
  --b1:#1e1e30;--b2:#28283c;--b3:#38385a;
  --t1:#e8e8f2;--t2:#8888a8;--t3:#44445a;
  --ac:#6366f1;--ac2:#818cf8;--ac3:#a5b4fc;
  --gn:#10b981;--yw:#f59e0b;--rd:#ef4444;--cy:#22d3ee;--og:#fb923c;--pk:#f472b6;--pu:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--t1);font-family:'IBM Plex Sans',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
button,select,input,textarea{font-family:'IBM Plex Sans',sans-serif;outline:none;border:none;color:inherit;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:var(--b2);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.12}}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}70%{box-shadow:0 0 0 8px rgba(99,102,241,0)}100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}}

/* ── Layout ── */
.topbar{background:var(--s1);border-bottom:1px solid var(--b1);height:50px;display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;z-index:50;}
.logo{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;color:var(--ac2);letter-spacing:2px;flex-shrink:0;white-space:nowrap;}
.logo em{color:var(--t3);font-style:normal;font-size:9px;margin-left:3px;}
.wfname{background:transparent;color:var(--t1);font-size:12px;padding:4px 8px;border:1px solid transparent;border-radius:5px;flex:1;min-width:60px;}
.wfname:focus{border-color:var(--ac);background:var(--s3);}
.ibtn{width:32px;height:32px;background:transparent;border:1px solid var(--b1);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.12s;flex-shrink:0;}
.ibtn:hover{border-color:var(--b3);background:var(--s2);}
.ibtn:active{transform:scale(.92);}
.ibtn.act{border-color:var(--ac);background:rgba(99,102,241,.12);}
.run-btn{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border-radius:8px;padding:8px 14px;font-weight:600;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;border:none;transition:.12s;white-space:nowrap;}
.run-btn:hover{opacity:.9;}
.run-btn:active{transform:scale(.96);}
.run-btn:disabled{background:var(--b2);color:var(--t3);cursor:not-allowed;transform:none;}

/* ── Tabs ── */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;}
.tab{flex:1;padding:9px 0;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:10px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;font-weight:500;transition:.1s;position:relative;}
.tab.act{color:var(--ac2);border-bottom-color:var(--ac2);}
.badge{background:var(--ac);color:#fff;font-size:8px;padding:1px 4px;border-radius:8px;margin-left:3px;font-weight:700;vertical-align:middle;}

/* ── Flow scroll ── */
.flow-scroll{flex:1;overflow-y:auto;overflow-x:hidden;}
.flow-inner{padding:12px 10px 90px;}

/* ── Node cards ── */
.nc{background:var(--s2);border:1.5px solid var(--b1);border-radius:12px;margin-bottom:5px;overflow:hidden;transition:border-color .15s,box-shadow .15s;animation:pop .15s;}
.nc:hover{border-color:var(--b2);}
.nc.sel{border-color:var(--ac)!important;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.nc.run{border-color:var(--yw)!important;}
.nc.done{border-color:var(--gn)!important;}
.nc.err{border-color:var(--rd)!important;}
.nc.disabled-node{opacity:.45;}
.nc.note-style{background:rgba(251,191,36,.04);border-color:rgba(251,191,36,.2)!important;}

.nh{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;user-select:none;}
.ni{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
.nprev{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;padding:0 13px 9px;word-break:break-all;line-height:1.5;}

/* ── Config panel ── */
.cfg{border-top:1px solid var(--b1);padding:13px;background:var(--s1);animation:fade .1s;}
.fl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;margin-top:11px;display:block;}
.fl:first-child{margin-top:0;}
.fi{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:6px;color:var(--t1);padding:8px 10px;font-size:12px;font-family:'IBM Plex Mono',monospace;transition:.12s;}
.fi:focus{border-color:var(--ac);background:#1c1c30;}
.fta{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:6px;color:var(--t1);padding:8px 10px;font-size:11px;resize:vertical;min-height:70px;line-height:1.6;font-family:'IBM Plex Mono',monospace;transition:.12s;}
.fta:focus{border-color:var(--ac);}
.fse{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:6px;color:var(--t1);padding:8px 10px;font-size:12px;}
.hint{font-size:10px;color:var(--t3);margin-top:4px;line-height:1.5;}
.mode-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;margin-bottom:3px;cursor:pointer;font-size:12px;border:1px solid var(--b1);background:var(--s3);transition:.1s;user-select:none;}
.mode-row:active{opacity:.7;}
.wbox{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);border-radius:6px;padding:8px 10px;font-size:10px;color:#fcd34d;line-height:1.6;margin-bottom:8px;}
.ibox{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--ac3);line-height:1.7;margin-top:8px;}
.sbox{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.2);border-radius:6px;padding:8px 10px;font-size:11px;color:#6ee7b7;font-family:'IBM Plex Mono',monospace;max-height:175px;overflow-y:auto;white-space:pre-wrap;line-height:1.6;margin-top:5px;word-break:break-word;}
.cbtn{padding:6px 11px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid;transition:.1s;font-weight:500;background:transparent;}
.cbtn:active{transform:scale(.94);}

/* ── Toggle switch ── */
.tog{width:36px;height:20px;background:var(--b2);border-radius:10px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.tog.on{background:var(--gn);}
.tog::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s;}
.tog.on::after{left:18px;}

/* ── Add bar ── */
.add-bar{background:var(--s1);border-top:1px solid var(--b1);padding:7px 10px 11px;flex-shrink:0;}
.chips-wrap{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;}
.chips-wrap::-webkit-scrollbar{height:0;}
.chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1px solid;transition:.1s;font-weight:500;}
.chip:active{transform:scale(.93);}

/* ── Arrow ── */
.arr{text-align:center;padding:1px 0;font-size:11px;color:var(--b2);user-select:none;position:relative;}
.arr-label{position:absolute;left:50%;transform:translateX(-50%);font-size:8px;color:var(--t3);background:var(--bg);padding:0 4px;top:-4px;white-space:nowrap;}

/* ── Logs ── */
.logs-wrap{flex:1;overflow-y:auto;}
.lrow{display:flex;gap:8px;padding:3px 13px;font-size:11px;font-family:'IBM Plex Mono',monospace;border-bottom:1px solid rgba(255,255,255,.02);word-break:break-word;}
.lt{color:var(--t3);flex-shrink:0;min-width:55px;font-size:10px;padding-top:1px;}

/* ── Templates ── */
.tmpl-wrap{flex:1;overflow-y:auto;padding:12px;}
.tcard{background:var(--s2);border:1.5px solid var(--b1);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;transition:.15s;animation:pop .15s;}
.tcard:hover{border-color:var(--ac);background:rgba(99,102,241,.04);}
.tcard:active{transform:scale(.98);}
.ttags{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.ttag{padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600;letter-spacing:.3px;}
.tflow{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-top:7px;padding:5px 8px;background:var(--bg);border-radius:5px;word-break:break-all;}

/* ── History ── */
.hist-wrap{flex:1;overflow-y:auto;padding:12px;}
.hcard{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px 13px;margin-bottom:6px;animation:pop .15s;}
.hcard-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}

/* ── Settings ── */
.stg-wrap{flex:1;overflow-y:auto;padding:12px;}
.scard{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:13px;margin-bottom:8px;}
.stit{font-size:12px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.saved-row{background:var(--s3);border:1px solid var(--b1);border-radius:7px;padding:9px 11px;margin-bottom:5px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:.12s;}
.saved-row:hover{border-color:var(--b3);}

/* ── Final output ── */
.final-out{background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:13px;margin-top:8px;}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;animation:fade .12s;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px 16px 0 0;width:100%;max-height:88dvh;overflow-y:auto;animation:slideUp .2s;}
.modal-handle{width:36px;height:3px;background:var(--b2);border-radius:2px;margin:12px auto 12px;}
.modal-title{font-size:14px;font-weight:600;padding:0 15px 11px;border-bottom:1px solid var(--b1);margin-bottom:12px;}
.mpanel{padding:0 15px 15px;}
.mopt{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.12s;}
.mopt:hover{border-color:var(--b3);}
.mopt:active{transform:scale(.97);}

/* ── Toast ── */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 15px;font-size:12px;z-index:999;animation:pop .2s;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5);pointer-events:none;}

/* ── Onboard ── */
.onboard{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(167,139,250,.06));border:1px solid rgba(99,102,241,.18);border-radius:12px;padding:18px;margin-bottom:12px;text-align:center;}

/* ── Run stats bar ── */
.stats-bar{background:var(--s1);border-bottom:1px solid var(--b1);padding:5px 13px;display:flex;gap:10px;align-items:center;flex-shrink:0;font-size:10px;color:var(--t3);}
.stat{display:flex;align-items:center;gap:4px;}
.stat-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);}

/* ── Progress bar ── */
.prog-wrap{height:2px;background:var(--b1);flex-shrink:0;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .3s;}
</style>
</head>

// CONDITION EVAL
// ════════════════════════════════════════
function evalCond(field,op,val,input){
  try{
    const v=new Function("input","return ("+field+")")(input);
    const n=Number;
    switch(op){
      case ">":           return n(v)>n(val);
      case ">=":          return n(v)>=n(val);
      case "<":           return n(v)<n(val);
      case "<=":          return n(v)<=n(val);
      case "==":          return String(v)===String(val);
      case "!=":          return String(v)!==String(val);
      case "contains":    return String(v).toLowerCase().includes(val.toLowerCase());
      case "not_contains":return !String(v).toLowerCase().includes(val.toLowerCase());
      case "starts_with": return String(v).startsWith(val);
      case "ends_with":   return String(v).endsWith(val);
      case "is_empty":    return !String(v).trim();
      case "not_empty":   return !!String(v).trim();
      default:            return true;
    }
  }catch{return false;}
}

      type==="set_var"    ?{name:def.l,template:"{{input}}"}:
      type==="merge"      ?{name:def.l,sep:"\n\n",prefix:""}:
      type==="note"       ?{name:"Note",text:""}:
      {name:def.l};
    setNodes(prev=>{
      const next=[...prev,{id,type,cfg,disabled:false,out:null,st:null}];
      setEdges(buildEdges(next));return next;
    });
    setSelId(id);setAddModal(false);
    setTimeout(()=>flowRef.current?.scrollTo({top:99999,behavior:"smooth"}),80);
    toast2(`✓ ${def.l} added`);
  },[pushUndo,toast2]);

  const delNode=useCallback(id=>{
    pushUndo();
    setSelId(p=>p===id?null:p);
    setNodes(prev=>{const n=prev.filter(x=>x.id!==id);setEdges(buildEdges(n));return n;});
    toast2("🗑 Deleted");
  },[pushUndo,toast2]);

  const dupNode=useCallback(id=>{
    pushUndo();
    const n=nodes.find(x=>x.id===id);if(!n) return;
    const nid=mkId();
    const nn={...clone(n),id:nid,cfg:{...clone(n.cfg),name:(n.cfg.name||"")+" (copy)"},out:null,st:null};
    setNodes(prev=>{
      const i=prev.findIndex(x=>x.id===id);
      const a=[...prev.slice(0,i+1),nn,...prev.slice(i+1)];
      setEdges(buildEdges(a));return a;
    });
    setSelId(nid);toast2("⊕ Duplicated");
  },[nodes,pushUndo,toast2]);

  const moveNode=useCallback((id,dir)=>{
    pushUndo();
    setNodes(prev=>{
      const i=prev.findIndex(x=>x.id===id);
      if(dir==="up"&&i===0||dir==="down"&&i===prev.length-1) return prev;
      const a=[...prev];const j=dir==="up"?i-1:i+1;
      [a[i],a[j]]=[a[j],a[i]];setEdges(buildEdges(a));return a;
    });
  },[pushUndo]);

  const toggleDisable=useCallback(id=>{
    setNodes(prev=>prev.map(n=>n.id===id?{...n,disabled:!n.disabled}:n));
  },[]);

  const updateCfg=useCallback((id,cfg)=>{
    setNodes(prev=>prev.map(n=>n.id===id?{...n,cfg}:n));
  },[]);

  // Save/load
  const saveWF=useCallback(()=>{
    const wf={id:mkId(),name:wfName,nodes:clone(nodes),edges:clone(edges),at:new Date().toLocaleString(),count:nodes.length};
    setSaved(prev=>{const n=[wf,...prev.slice(0,9)];localStorage.setItem("fai_saved",JSON.stringify(n));return n;});
    setSaveModal(false);toast2("💾 Saved!");
  },[wfName,nodes,edges,toast2]);

  const loadWF=useCallback(wf=>{
    setNodes(clone(wf.nodes));setEdges(clone(wf.edges));setWfName(wf.name);
    setSelId(null);setLogs([]);setTab("flow");toast2(`📂 Loaded: ${wf.name}`);
  },[toast2]);

  const deleteSaved=useCallback(id=>{
    setSaved(prev=>{const n=prev.filter(w=>w.id!==id);localStorage.setItem("fai_saved",JSON.stringify(n));return n;});
  },[]);

  const exportWF=useCallback(()=>{
    const d=JSON.stringify({name:wfName,nodes,edges,version:"v3"},null,2);
    const b=new Blob([d],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download=`${wfName.replace(/\s+/g,"-")}.json`;a.click();
    URL.revokeObjectURL(u);toast2("⬇ Exported!");
  },[wfName,nodes,edges,toast2]);

  const importWF=useCallback(e=>{
    const f=e.target.files?.[0];if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        setNodes(d.nodes);setEdges(d.edges);setWfName(d.name||"Imported");
        setSelId(null);setTab("flow");toast2("✓ Imported!");
      }catch{toast2("✕ Invalid JSON","#ef4444");}
    };
    r.readAsText(f);
    e.target.value="";
  },[toast2]);

  const loadTemplate=useCallback(t=>{
    pushUndo();
    const idMap={};
    const newNodes=t.nodes.map(n=>{
      const nid=mkId();idMap[n.id]=nid;
      return{...clone(n),id:nid,out:null,st:null,disabled:false};
    });
    setNodes(newNodes);setEdges(buildEdges(newNodes));setWfName(t.name);
    setSelId(null);setLogs([]);setTab("flow");
    toast2(`✓ "${t.name}" loaded!`);
  },[pushUndo,toast2]);

  const addLog=useCallback((msg,type="info")=>{
    setLogs(prev=>[...prev,{msg,type,t:new Date().toLocaleTimeString()}]);
  },[]);

  // ════════════════════════════════════════
  // RUN
  // ════════════════════════════════════════
  const run=useCallback(async()=>{
    const curNodes=clone(nodes);
    const curEdges=clone(edges);
    const aiNodes=curNodes.filter(n=>["ai_agent","ai_chain","ai_decision"].includes(n.type)&&!n.disabled);

    if(!apiKey&&aiNodes.length){
      setTab("settings");
      setTimeout(()=>alert("⚠ Groq API Key দাও!\n\nFree key:\nconsole.groq.com → API Keys → Create"),100);
      return;
    }

    setRunning(true);setLogs([]);setTab("logs");setRunProg(0);
    setNodes(prev=>prev.map(n=>({...n,st:null,out:null})));

    const trigger=curNodes.find(n=>["manual","webhook","scheduler"].includes(n.type)&&!n.disabled);
    if(!trigger){addLog("❌ Trigger node নেই!","err");setRunning(false);return;}

    const order=[];const seen=new Set();const q=[trigger.id];
    while(q.length){const id=q.shift();if(seen.has(id))continue;seen.add(id);order.push(id);curEdges.filter(e=>e.src===id).forEach(e=>q.push(e.tgt));}

    // filter disabled nodes from execution order
    const execOrder=order.filter(id=>{const n=curNodes.find(x=>x.id===id);return n&&!n.disabled;});

    addLog(`▶ "${wfName}" শুরু — ${execOrder.length} active nodes`);
    const outs={};const start=Date.now();

    for(let ei=0;ei<execOrder.length;ei++){
      const nid=execOrder[ei];
      const node=curNodes.find(n=>n.id===nid);if(!node) continue;
      const def=DEFS[node.type]||{l:node.type,i:"?"};

      if(node.type==="note"){outs[nid]="";continue;}

      setRunProg(Math.round(((ei)/execOrder.length)*100));
      setNodes(prev=>prev.map(n=>n.id===nid?{...n,st:"run"}:n));
      const prev=curEdges.filter(e=>e.tgt===nid).map(e=>outs[e.src]||"").filter(Boolean).join("\n");
      addLog(`⟶ [${def.l}]${node.cfg.name&&node.cfg.name!==def.l?" — "+node.cfg.name:""}`);
      let result="";

      try{
        if(["manual","webhook","scheduler"].includes(node.type)){
          result="Triggered ✓";addLog("  ✓ Fired","ok");
        }
        else if(node.type==="ai_agent"){
          const model=node.cfg.model||"llama-3.3-70b-versatile";
          addLog(`  → Groq (${model.split("-").slice(0,3).join("-")})…`);
          const userMsg=(node.cfg.msg||"{{input}}").replace(/\{\{input\}\}/g,prev||"Hello");
          const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
            body:JSON.stringify({model,max_tokens:node.cfg.maxTokens||600,messages:[
              {role:"system",content:node.cfg.sys||"You are helpful."},
              {role:"user",content:userMsg},
            ]}),
          });
          const d=await res.json();
          if(d.error) throw new Error(d.error.message);
          result=d.choices?.[0]?.message?.content||"(no response)";
          addLog(`  ✓ ${result.length} chars`,"ok");
        }
        else if(node.type==="ai_chain"){
          const model=node.cfg.model||"llama-3.3-70b-versatile";
          addLog("  → Step 1…");
          const m1=(node.cfg.msg1||"{{input}}").replace(/\{\{input\}\}/g,prev||"Hello");
          const r1=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model,max_tokens:600,messages:[{role:"system",content:node.cfg.sys1||"You are helpful."},{role:"user",content:m1}]})});
          const d1=await r1.json();if(d1.error) throw new Error(d1.error.message);
          const step1=d1.choices?.[0]?.message?.content||"";
          addLog(`  ✓ Step 1: ${step1.length} chars`,"ok");
          addLog("  → Step 2…");
          const m2=(node.cfg.msg2||"{{step1}}").replace(/\{\{step1\}\}/g,step1).replace(/\{\{input\}\}/g,prev||"");
          const r2=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model,max_tokens:800,messages:[{role:"system",content:node.cfg.sys2||"You are helpful."},{role:"user",content:m2}]})});
          const d2=await r2.json();if(d2.error) throw new Error(d2.error.message);
          result=d2.choices?.[0]?.message?.content||"";
          addLog(`  ✓ Step 2: ${result.length} chars`,"ok");
        }
        else if(node.type==="ai_decision"){
          const model=node.cfg.model||"llama-3.1-8b-instant";
          addLog(`  → AI Decision (${model.split("-")[0]})…`);
          const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
            body:JSON.stringify({model,max_tokens:10,messages:[
              {role:"system",content:`Answer ONLY "yes" or "no". Criteria: ${node.cfg.criteria||"Is this positive?"}`},
              {role:"user",content:prev||"Hello"},
            ]}),
          });
          const d=await res.json();if(d.error) throw new Error(d.error.message);
          result=(d.choices?.[0]?.message?.content||"no").toLowerCase().trim();
          addLog(`  ✓ Decision: "${result}"`,"ok");
        }
        else if(node.type==="http"){
          if(!node.cfg.url?.trim()) throw new Error("URL দাও!");
          addLog(`  → ${node.cfg.method||"GET"} ${node.cfg.url.slice(0,40)}…`);
          let headers={"Content-Type":"application/json"};
          if(node.cfg.headers){try{headers={...headers,...JSON.parse(node.cfg.headers)};}catch{}}
          const opts={method:node.cfg.method||"GET",headers};
          if(node.cfg.body&&!["GET","HEAD"].includes(node.cfg.method))
            opts.body=node.cfg.body.replace(/\{\{input\}\}/g,prev);
          const res=await fetch(node.cfg.url,opts);
          result=await res.text();addLog(`  ✓ HTTP ${res.status} — ${result.length} chars`,"ok");
        }
        else if(node.type==="code"){
          const fn=new Function("input",node.cfg.code||"return input;");
          const raw=fn(prev);
          result=raw==null?"":String(raw);addLog("  ✓ Code executed","ok");
        }
        else if(node.type==="delay"){
          const s=Math.min(30,parseFloat(node.cfg.seconds)||2);
          addLog(`  ⏳ Waiting ${s}s…`);
          await new Promise(r=>setTimeout(r,s*1000));
          result=prev;addLog("  ✓ Done","ok");
        }
        else if(node.type==="loop"){
          const n=Math.min(10,parseInt(node.cfg.times)||3);
          const sep=node.cfg.separator!=null?node.cfg.separator:" | ";
          result=Array(n).fill(prev).join(sep);
          addLog(`  ✓ Repeated ${n}x`,"ok");
        }
        else if(node.type==="transform"){
          const m=node.cfg.mode||"uppercase";
          switch(m){
            case "uppercase":    result=prev.toUpperCase();break;
            case "lowercase":    result=prev.toLowerCase();break;
            case "trim":         result=prev.trim();break;
            case "reverse":      result=[...prev].reverse().join("");break;
            case "word_count":   result=`${prev.trim().split(/\s+/).filter(Boolean).length} words`;break;
            case "char_count":   result=`${prev.length} characters`;break;
            case "line_count":   result=`${prev.split("\n").length} lines`;break;
            case "remove_spaces":result=prev.replace(/\s+/g,"");break;
            case "title_case":   result=prev.replace(/\w\S*/g,t=>t[0].toUpperCase()+t.slice(1).toLowerCase());break;
            case "snake_case":   result=prev.trim().toLowerCase().replace(/\s+/g,"_");break;
            case "base64_enc":   result=btoa(unescape(encodeURIComponent(prev)));break;
            case "base64_dec":   try{result=decodeURIComponent(escape(atob(prev)));}catch{result="[Invalid base64]";}break;
            default: result=prev;
          }
          addLog(`  ✓ ${m}`,"ok");
        }
        else if(node.type==="condition"){
          const pass=evalCond(node.cfg.field||"input.length",node.cfg.op||">",node.cfg.val||"0",prev);
          result=pass?prev:"";
          addLog(`  ${pass?"✓ PASS":"✗ FAIL"}: ${node.cfg.field} ${node.cfg.op} "${node.cfg.val}"`,pass?"ok":"warn");
        }
        else if(node.type==="json_parse"){
          try{
            let obj=JSON.parse(prev);
            const keys=(node.cfg.field||"").split(".").filter(Boolean);
            for(const k of keys){if(obj&&k in Object(obj)) obj=obj[k]; else{obj=undefined;break;}}
            result=obj!=null?(typeof obj==="object"?JSON.stringify(obj,null,2):String(obj)):node.cfg.fallback||"Not found";
          }catch{result=node.cfg.fallback||"Parse error";}
          addLog(`  ✓ Extracted`,"ok");
        }
        else if(node.type==="set_var"){
          result=(node.cfg.template||"{{input}}").replace(/\{\{input\}\}/g,prev);
          addLog("  ✓ Variable set","ok");
        }
        else if(node.type==="merge"){
          result=(node.cfg.prefix?node.cfg.prefix+"\n":"")+prev;
          addLog("  ✓ Merged","ok");
        }
        else if(node.type==="email"){
          const{serviceId,templateId,publicKey,to,subject,message}=node.cfg;
          if(serviceId&&templateId&&publicKey&&to){
            const body=(message||"{{input}}").replace(/\{\{input\}\}/g,prev);
            const res=await fetch("https://api.emailjs.com/api/v1.0/email/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service_id:serviceId,template_id:templateId,user_id:publicKey,template_params:{to_email:to,subject:subject||"FlowAI",message:body}})});
            if(!res.ok){const t=await res.text();throw new Error(`EmailJS: ${t}`);}
            result=`✉ Sent to ${to}`;addLog(`  ✓ Email sent!`,"ok");
          }else{result="[Email simulated — configure EmailJS]";addLog("  ⚠ Email simulated","warn");}
        }
        else if(node.type==="slack"){
          if(node.cfg.webhookUrl){
            const msg=(node.cfg.message||"{{input}}").replace(/\{\{input\}\}/g,prev);
            const res=await fetch(node.cfg.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:msg})});
            result=res.ok?"✓ Slack sent":`Slack error ${res.status}`;
            addLog(res.ok?"  ✓ Slack sent":"  ✕ Slack error",res.ok?"ok":"err");
          }else{result="[Slack simulated]";addLog("  ⚠ Slack simulated","warn");}
        }
        else if(node.type==="webhook_out"){
          if(node.cfg.url){
            let headers={"Content-Type":"application/json"};
            if(node.cfg.headers){try{headers={...headers,...JSON.parse(node.cfg.headers)};}catch{}}
            await fetch(node.cfg.url,{method:"POST",headers,body:JSON.stringify({data:prev,ts:Date.now()})});
            result=`→ Sent to ${node.cfg.url.slice(0,40)}`;addLog("  ✓ Webhook sent","ok");
          }else{result="[Webhook Out simulated]";addLog("  ⚠ No URL","warn");}
        }
        else if(node.type==="output"){
          result=prev||"(no input)";addLog("  ✓ Output captured","ok");
        }

        outs[nid]=result;
        setNodes(prev=>prev.map(n=>n.id===nid?{...n,st:"done",out:result}:n));
        await new Promise(r=>setTimeout(r,200));
      }catch(err){
        const msg=String(err.message||err);
        addLog(`  ✕ ${msg}`,"err");
        setNodes(prev=>prev.map(n=>n.id===nid?{...n,st:"err",out:"ERROR: "+msg}:n));
        outs[nid]="";
      }
    }

    const elapsed=((Date.now()-start)/1000).toFixed(1);
    addLog("────────────────────","info");
    addLog(`✅ Done in ${elapsed}s`,"ok");
    setRunProg(100);
    setRunning(false);

    // Save to history
    const lastResult=Object.values(outs).filter(Boolean).slice(-1)[0]||"";
    const hEntry={id:mkId(),name:wfName,elapsed,at:new Date().toLocaleTimeString(),nodes:execOrder.length,preview:lastResult.slice(0,80),status:"ok"};
    setHistory(prev=>{const n=[hEntry,...prev.slice(0,14)];localStorage.setItem("fai_hist",JSON.stringify(n));return n;});
    toast2(`✅ Done in ${elapsed}s`);
    setTab("flow");
  },[nodes,edges,apiKey,wfName,addLog,toast2]);

  // Filtered templates
  const tmplCats=["All","Beginner","Intermediate","Advanced","AI","API","Data"];
  const filteredTmpl=useMemo(()=>TEMPLATES.filter(t=>{
    const q=searchQ.toLowerCase();
    const matchQ=!q||t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.tags.some(g=>g.toLowerCase().includes(q));
    const matchCat=tmplFilter==="All"||t.difficulty===tmplFilter||t.tags.includes(tmplFilter);
    return matchQ&&matchCat;
  }),[tmplFilter,searchQ]);

  const lastOut=nodes.filter(n=>n.st==="done"&&n.out&&!["manual","webhook","scheduler","note"].includes(n.type)).slice(-1)[0]?.out;
  const doneCount=nodes.filter(n=>n.st==="done").length;
  const errCount=nodes.filter(n=>n.st==="err").length;

  return(<>
    {/* TOP BAR */}
    <div className="topbar">
      <span className="logo">FLOW<em>AI v3</em></span>
      <input className="wfname" value={wfName} onChange={e=>setWfName(e.target.value)} maxLength={38}/>
      <div style={{display:"flex",gap:3,flexShrink:0}}>
        <button className="ibtn" title="Undo (last 15)" onClick={doUndo} style={{opacity:undo.length?1:.3}}>↩</button>
        <button className="ibtn" title="Save" onClick={()=>setSaveModal(true)}>💾</button>
        <button className="ibtn" title="Export JSON" onClick={exportWF}>⬇</button>
        <label className="ibtn" title="Import JSON" style={{cursor:"pointer"}}>
          ⬆<input type="file" accept=".json" style={{display:"none"}} onChange={importWF}/>
        </label>
      </div>
      <button className="run-btn" onClick={run} disabled={running}>
        {running?<><span style={{width:11,height:11,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin .6s linear infinite"}}/> Running…</>:"▶ Run"}
      </button>
    </div>

    {/* Progress bar */}
    <div className="prog-wrap">
      <div className="prog-bar" style={{width:`${running?runProg:0}%`}}/>
    </div>

    {/* TABS */}
    <div className="tabs">
      <button className={`tab ${tab==="flow"?"act":""}`} onClick={()=>setTab("flow")}>
        ◈ Flow{nodes.length>0&&<span className="badge">{nodes.filter(n=>!n.disabled).length}</span>}
      </button>
      <button className={`tab ${tab==="tmpl"?"act":""}`} onClick={()=>setTab("tmpl")}>⊞ Templates</button>
      <button className={`tab ${tab==="logs"?"act":""}`} onClick={()=>setTab("logs")}>
        ▤ Logs{logs.length>0&&<span className="badge">{logs.length}</span>}
      </button>
      <button className={`tab ${tab==="hist"?"act":""}`} onClick={()=>setTab("hist")}>🕐 History</button>
      <button className={`tab ${tab==="stg"?"act":""}`} onClick={()=>setTab("stg")}>⚙</button>
    </div>

    {/* Stats bar (after run) */}
    {(doneCount>0||errCount>0)&&tab==="flow"&&(
      <div className="stats-bar">
        <span className="stat"><span className="stat-dot"/>{doneCount} done</span>
        {errCount>0&&<span className="stat"><span className="stat-dot" style={{background:"var(--rd)"}}/>{errCount} error</span>}
        <span style={{flex:1}}/>
        <span style={{color:"var(--t3)",fontSize:10}}>{nodes.filter(n=>n.disabled).length} disabled</span>
      </div>
    )}

    {/* ════ FLOW ════ */}
    {tab==="flow"&&<>
      <div className="flow-scroll" ref={flowRef}>
        <div className="flow-inner">
          {nodes.length===0&&(
            <div className="onboard">
              <div style={{fontSize:32,marginBottom:8}}>◈</div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:5}}>FlowAI v3</div>
              <div style={{fontSize:11,color:"var(--t2)",lineHeight:1.7}}>নিচে + button দিয়ে node add করো<br/>অথবা Templates থেকে ready workflow নাও</div>
            </div>
          )}

          {nodes.map((node,i)=>{
            const def=DEFS[node.type]||{l:node.type,i:"?",c:"#888",d:""};
            const open=selId===node.id;
            const sc=node.st==="run"?"var(--yw)":node.st==="done"?"var(--gn)":node.st==="err"?"var(--rd)":null;
            return(
              <div key={node.id}>
                <div className={`nc ${open?"sel":""} ${node.st||""} ${node.type==="note"?"note-style":""} ${node.disabled?"disabled-node":""}`}>
                  <div className="nh" onClick={()=>setSelId(open?null:node.id)}>
                    <div className="ni" style={{background:def.c+"18",color:def.c}}>{def.i}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:node.disabled?"var(--t3)":def.c,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        {node.disabled&&"[OFF] "}{node.cfg.name||def.l}
                      </div>
                      <div style={{fontSize:9,color:"var(--t3)",marginTop:1}}>{def.d}</div>
                    </div>
                    {sc&&<div style={{width:7,height:7,borderRadius:"50%",background:sc,flexShrink:0,animation:node.st==="run"?"blink 1s infinite":"none"}}/>}
                    <span style={{color:"var(--t3)",fontSize:10,marginLeft:4}}>{open?"▲":"▼"}</span>
                  </div>

                  {!open&&node.out&&node.type!=="note"&&(
                    <div className="nprev" style={{color:node.st==="err"?"var(--rd)":"#6ee7b7"}}>
                      → {node.out.slice(0,90)}{node.out.length>90?"…":""}
                    </div>
                  )}

                  {open&&(
                    <div className="cfg">
                      {/* Disable toggle */}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,padding:"8px 10px",background:"var(--s3)",borderRadius:7,border:"1px solid var(--b1)"}}>
                        <span style={{fontSize:11,color:"var(--t2)"}}>Node Active</span>
                        <div className={`tog ${!node.disabled?"on":""}`} onClick={()=>toggleDisable(node.id)}/>
                      </div>

                      <NCfg node={node} set={(k,v)=>updateCfg(node.id,{...node.cfg,[k]:v})}/>

                      {node.out&&<>
                        <span className="fl" style={{color:node.st==="err"?"var(--rd)":"var(--gn)"}}>{node.st==="err"?"✕ Error":"✓ Output"}</span>
                        <div className="sbox" style={{borderColor:node.st==="err"?"rgba(239,68,68,.25)":"",color:node.st==="err"?"var(--rd)":"#6ee7b7"}}>{node.out}</div>
                      </>}

                      <div style={{display:"flex",gap:4,marginTop:12,flexWrap:"wrap"}}>
                        {i>0&&<button className="cbtn" onClick={()=>moveNode(node.id,"up")} style={{color:"var(--ac2)",borderColor:"rgba(99,102,241,.2)"}}>↑</button>}
                        {i<nodes.length-1&&<button className="cbtn" onClick={()=>moveNode(node.id,"down")} style={{color:"var(--ac2)",borderColor:"rgba(99,102,241,.2)"}}>↓</button>}
                        <button className="cbtn" onClick={()=>dupNode(node.id)} style={{color:"var(--cy)",borderColor:"rgba(34,211,238,.2)"}}>⊕ Dup</button>
                        <button className="cbtn" onClick={()=>setSelId(null)} style={{color:"var(--t3)",borderColor:"var(--b1)"}}>✕ Close</button>
                        <button className="cbtn" onClick={()=>delNode(node.id)} style={{color:"var(--rd)",borderColor:"rgba(239,68,68,.2)",marginLeft:"auto"}}>🗑</button>
                      </div>
                    </div>
                  )}
                </div>
                {i<nodes.length-1&&<div className="arr">↓</div>}
              </div>
            );
          })}

          {lastOut&&(
            <div className="final-out">
              <div style={{display:"flex",alignItems:"center",marginBottom:7}}>
                <span style={{fontSize:9,color:"var(--gn)",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",flex:1}}>✅ Final Output</span>
                <button onClick={()=>navigator.clipboard?.writeText(lastOut).then(()=>toast2("📋 Copied!")).catch(()=>toast2("✕ Copy failed","#ef4444"))}
                  style={{background:"rgba(16,185,129,.1)",color:"var(--gn)",border:"1px solid rgba(16,185,129,.2)",borderRadius:5,padding:"4px 9px",fontSize:10,cursor:"pointer"}}>📋 Copy</button>
              </div>
              <div style={{fontSize:11,color:"#a7f3d0",fontFamily:"monospace",lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{lastOut}</div>
            </div>
          )}
        </div>
      </div>

      {/* Add Node Bar */}
      <div className="add-bar">
        <div className="chips-wrap">
          <div className="chip" style={{color:"var(--ac2)",borderColor:"rgba(99,102,241,.3)",background:"rgba(99,102,241,.1)",fontWeight:700}}
            onClick={()=>setAddModal(true)}>+ Add Node</div>
          {Object.entries(DEFS).map(([type,def])=>(
            <div key={type} className="chip" style={{color:def.c,borderColor:def.c+"30",background:def.c+"0c"}} onClick={()=>addNode(type)}>
              <span style={{fontFamily:"monospace"}}>{def.i}</span>
              <span>{def.l}</span>
            </div>
          ))}
        </div>
      </div>
    </>}

    {/* ════ TEMPLATES ════ */}
    {tab==="tmpl"&&(
      <div className="tmpl-wrap">
        {/* Search */}
        <input className="fi" value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 Search templates..." style={{marginBottom:8}}/>
        {/* Filter */}
        <div style={{display:"flex",gap:5,overflow:"auto",marginBottom:10,paddingBottom:2}}>
          {tmplCats.map(c=>(
            <div key={c} onClick={()=>setTmplFilter(c)}
              style={{padding:"4px 11px",borderRadius:20,border:"1px solid",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",flexShrink:0,transition:".1s",
                color:tmplFilter===c?"var(--ac2)":"var(--t3)",
                borderColor:tmplFilter===c?"rgba(99,102,241,.4)":"var(--b1)",
                background:tmplFilter===c?"rgba(99,102,241,.08)":"transparent"}}>
              {c}
            </div>
          ))}
        </div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:8}}>{filteredTmpl.length} templates</div>
        {filteredTmpl.map(t=>(
          <div key={t.id} className="tcard" onClick={()=>loadTemplate(t)}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontSize:26,flexShrink:0}}>{t.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                  <span style={{fontSize:13,fontWeight:600}}>{t.name}</span>
                  <span style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:t.difficulty==="Beginner"?"rgba(16,185,129,.15)":t.difficulty==="Advanced"?"rgba(239,68,68,.15)":"rgba(245,158,11,.15)",color:t.difficulty==="Beginner"?"var(--gn)":t.difficulty==="Advanced"?"var(--rd)":"var(--yw)",fontWeight:700}}>{t.difficulty}</span>
                </div>
                <div style={{fontSize:11,color:"var(--t2)",lineHeight:1.5,marginBottom:5}}>{t.desc}</div>
                <div className="tflow">{t.flow}</div>
                <div className="ttags">
                  {t.tags.map((tag,i)=>(
                    <span key={tag} className="ttag" style={{background:t.tc[i]+"18",color:t.tc[i],border:`1px solid ${t.tc[i]}30`}}>{tag}</span>
                  ))}
                </div>
              </div>
              <div style={{background:"rgba(99,102,241,.12)",color:"var(--ac2)",border:"1px solid rgba(99,102,241,.25)",borderRadius:6,padding:"5px 9px",fontSize:10,flexShrink:0,fontWeight:600}}>Load →</div>
            </div>
          </div>
        ))}
      </div>
    )}

    {/* ════ LOGS ════ */}
    {tab==="logs"&&(
      <div className="logs-wrap">
        <div style={{display:"flex",alignItems:"center",padding:"7px 13px",borderBottom:"1px solid var(--b1)",gap:8,background:"var(--s1)",flexShrink:0}}>
          <span style={{fontSize:10,color:"var(--t3)",flex:1}}>{logs.length} entries</span>
          {logs.length>0&&<>
            <button onClick={()=>{const txt=logs.map(l=>`[${l.t}] ${l.msg}`).join("\n");navigator.clipboard?.writeText(txt).then(()=>toast2("📋 Logs copied!"));}}
              style={{background:"transparent",color:"var(--t3)",border:"1px solid var(--b1)",borderRadius:5,padding:"4px 9px",fontSize:10,cursor:"pointer"}}>📋 Copy</button>
            <button onClick={()=>setLogs([])} style={{background:"rgba(239,68,68,.08)",color:"var(--rd)",border:"1px solid rgba(239,68,68,.15)",borderRadius:5,padding:"4px 9px",fontSize:10,cursor:"pointer"}}>Clear</button>
          </>}
        </div>
        {logs.length===0
          ?<div style={{textAlign:"center",padding:"60px 0",color:"var(--t3)",fontSize:12}}>▶ Run চাপলে live logs দেখাবে</div>
          :logs.map((l,i)=>(
            <div key={i} className="lrow" style={{color:l.type==="err"?"var(--rd)":l.type==="ok"?"var(--gn)":l.type==="warn"?"var(--yw)":"var(--t3)"}}>
              <span className="lt">{l.t}</span>
              <span style={{flex:1}}>{l.msg}</span>
            </div>
          ))
        }
      </div>
    )}

    {/* ════ HISTORY ════ */}
    {tab==="hist"&&(
      <div className="hist-wrap">
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:8}}>Last {history.length} runs</div>
        {history.length===0
          ?<div style={{textAlign:"center",padding:"60px 0",color:"var(--t3)",fontSize:12}}>🕐 Run করলে এখানে history দেখাবে</div>
          :history.map((h,i)=>(
            <div key={h.id} className="hcard">
              <div className="hcard-head">
                <div style={{width:8,height:8,borderRadius:"50%",background:h.status==="ok"?"var(--gn)":"var(--rd)",flexShrink:0}}/>
                <span style={{fontSize:12,fontWeight:600,flex:1}}>{h.name}</span>
                <span style={{fontSize:10,color:"var(--t3)"}}>{h.at}</span>
              </div>
              <div style={{fontSize:10,color:"var(--t3)",marginBottom:4}}>{h.nodes} nodes · {h.elapsed}s</div>
              {h.preview&&<div style={{fontSize:10,color:"var(--t2)",fontFamily:"monospace",background:"var(--bg)",padding:"5px 7px",borderRadius:4,lineHeight:1.5}}>{h.preview}{h.preview.length===80?"…":""}</div>}
            </div>
          ))
        }
        {history.length>0&&<button onClick={()=>{setHistory([]);localStorage.removeItem("fai_hist");toast2("🗑 History cleared");}} style={{width:"100%",padding:"9px",background:"rgba(239,68,68,.08)",color:"var(--rd)",border:"1px solid rgba(239,68,68,.18)",borderRadius:7,fontSize:11,cursor:"pointer",marginTop:4}}>Clear History</button>}
      </div>
    )}

    {/* ════ SETTINGS ════ */}
    {tab==="stg"&&(
      <div className="stg-wrap">
        {/* API Key */}
        <div className="scard">
          <div className="stit">🆓 Groq API Key <span style={{background:"rgba(16,185,129,.15)",color:"var(--gn)",padding:"1px 7px",borderRadius:4,fontSize:9,fontWeight:700}}>FREE</span></div>
          <input type="password" className="fi" value={apiKey} onChange={e=>saveKey(e.target.value)} placeholder="gsk_xxxxxxxxxxxx" style={{marginBottom:6}}/>
          {apiKey
            ?<div style={{fontSize:11,color:"var(--gn)"}}>✓ Key saved: {apiKey.slice(0,10)}…</div>
            :<div className="ibox">1️⃣ console.groq.com → Sign up<br/>2️⃣ API Keys → Create API Key<br/>3️⃣ Copy → এখানে paste করো<br/><span style={{color:"var(--t3)"}}>Free: হাজার request/day!</span></div>
          }
        </div>

        {/* Saved WFs */}
        <div className="scard">
          <div className="stit">💾 Saved Workflows ({saved.length}/10)</div>
          {saved.length===0
            ?<div style={{fontSize:11,color:"var(--t3)"}}>💾 Topbar এর 💾 বাটন দিয়ে save করো।</div>
            :saved.map(wf=>(
              <div key={wf.id} className="saved-row" onClick={()=>loadWF(wf)}>
                <span style={{fontSize:14}}>◈</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{wf.name}</div>
                  <div style={{fontSize:10,color:"var(--t3)"}}>{wf.count} nodes · {wf.at}</div>
                </div>
                <button onClick={e=>{e.stopPropagation();deleteSaved(wf.id);}} style={{background:"rgba(239,68,68,.08)",color:"var(--rd)",border:"none",borderRadius:5,padding:"4px 8px",fontSize:10,cursor:"pointer"}}>✕</button>
              </div>
            ))
          }
        </div>

        {/* Stats */}
        <div className="scard">
          <div className="stit">📊 Workflow Stats</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[
              {l:"Total Nodes",v:nodes.length,c:"var(--ac2)"},
              {l:"Active",v:nodes.filter(n=>!n.disabled).length,c:"var(--gn)"},
              {l:"Disabled",v:nodes.filter(n=>n.disabled).length,c:"var(--t3)"},
              {l:"Connections",v:edges.length,c:"var(--cy)"},
              {l:"Run History",v:history.length,c:"var(--yw)"},
              {l:"Saved WFs",v:saved.length,c:"var(--pk)"},
            ].map(s=>(
              <div key={s.l} style={{background:"var(--s3)",borderRadius:7,padding:"9px 10px",border:"1px solid var(--b1)"}}>
                <div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div>
                <div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Actions */}
        <div className="scard">
          <div className="stit">⚙ Actions</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <button onClick={exportWF} style={{padding:"9px",background:"rgba(99,102,241,.1)",color:"var(--ac2)",border:"1px solid rgba(99,102,241,.2)",borderRadius:7,fontSize:11,cursor:"pointer"}}>⬇ Export JSON</button>
            <label style={{padding:"9px",background:"rgba(16,185,129,.08)",color:"var(--gn)",border:"1px solid rgba(16,185,129,.18)",borderRadius:7,fontSize:11,cursor:"pointer",textAlign:"center"}}>
              ⬆ Import JSON<input type="file" accept=".json" style={{display:"none"}} onChange={importWF}/>
            </label>
            <button onClick={doUndo} style={{padding:"9px",background:"rgba(251,191,36,.08)",color:"var(--yw)",border:"1px solid rgba(251,191,36,.18)",borderRadius:7,fontSize:11,cursor:"pointer"}}>↩ Undo</button>
            <button onClick={()=>{if(confirm("Reset করবো?")){setNodes(INIT().nodes);setEdges(INIT().edges);setLogs([]);setSelId(null);toast2("🔄 Reset!");}}} style={{padding:"9px",background:"rgba(239,68,68,.07)",color:"var(--rd)",border:"1px solid rgba(239,68,68,.15)",borderRadius:7,fontSize:11,cursor:"pointer"}}>🗑 Reset</button>
          </div>
        </div>

        {/* About */}
        <div className="scard">
          <div className="stit">ℹ FlowAI v3</div>
          <div style={{fontSize:11,color:"var(--t3)",lineHeight:1.9}}>
            {Object.keys(DEFS).length} node types · {TEMPLATES.length} templates<br/>
            ✓ Save / Load / Export / Import<br/>
            ✓ Run History · Undo (15 steps)<br/>
            ✓ Node disable/enable toggle<br/>
            ✓ Duplicate nodes<br/>
            ✓ Template search & filter<br/>
            ✓ Base64 encode/decode<br/>
            ✓ AI Decision + AI Chain nodes<br/>
            ✓ Loop / Repeat node
          </div>
        </div>
      </div>
    )}

    {/* ════ ADD NODE MODAL ════ */}
    {addModal&&(
      <div className="modal-bg" onClick={()=>setAddModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-handle"/>
          <div className="modal-title">+ Add Node</div>
          <div className="mpanel">
            {Object.entries(
              Object.entries(DEFS).reduce((acc,[type,def])=>{
                (acc[def.cat]=acc[def.cat]||[]).push([type,def]);return acc;
              },{})
            ).map(([cat,items])=>(
              <div key={cat} style={{marginBottom:12}}>
                <div style={{fontSize:9,color:"var(--t3)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5,fontWeight:600}}>
                  {cat==="trigger"?"⚡ Triggers":cat==="ai"?"✦ AI":cat==="action"?"⚙ Actions":cat==="data"?"◈ Data":cat==="output"?"◉ Output":"🔧 Utility"}
                </div>
                {items.map(([type,def])=>(
                  <div key={type} className="mopt" onClick={()=>addNode(type)}>
                    <div style={{width:28,height:28,borderRadius:6,background:def.c+"18",color:def.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontFamily:"monospace",flexShrink:0}}>{def.i}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:500}}>{def.l}</div>
                      <div style={{fontSize:10,color:"var(--t3)"}}>{def.d}</div>
                    </div>
                    <span style={{color:"var(--t3)",fontSize:12}}>+</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
    )}

    {/* ════ SAVE MODAL ════ */}
    {saveModal&&(
      <div className="modal-bg" onClick={()=>setSaveModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-handle"/>
          <div className="modal-title">💾 Save Workflow</div>
          <div className="mpanel">
            <span className="fl">Workflow Name</span>
            <input className="fi" value={wfName} onChange={e=>setWfName(e.target.value)} style={{marginBottom:8}}/>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:12}}>{nodes.length} nodes সহ save হবে</div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={saveWF} style={{flex:1,padding:"11px",background:"linear-gradient(135deg,var(--ac),var(--ac2))",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Save</button>
              <button onClick={()=>setSaveModal(false)} style={{flex:1,padding:"11px",background:"var(--s3)",color:"var(--t2)",border:"1px solid var(--b1)",borderRadius:8,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      </div>
    )}

    {/* TOAST */}
    {toast&&<div className="toast" style={{color:toast.col}}>{toast.msg}</div>}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
