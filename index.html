<style>
:root{
  --bg:#08080e;--s1:#0f0f1a;--s2:#141420;--s3:#1a1a28;
  --b1:#1e1e30;--b2:#28283c;--b3:#38385a;
  --t1:#e8e8f2;--t2:#8888a8;--t3:#44445a;
  --ac:#6366f1;--ac2:#818cf8;--ac3:#a5b4fc;
  --gn:#10b981;--yw:#f59e0b;--rd:#ef4444;--cy:#22d3ee;--og:#fb923c;--pk:#f472b6;--pu:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t1);font-family:'IBM Plex Sans',sans-serif;height:100dvh;}
#root{display:flex;flex-direction:column;height:100dvh;}
button,input,select,textarea{font-family:'IBM Plex Sans',sans-serif;outline:none;border:none;color:inherit;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:var(--b2);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}

/* ═══ AUTH / WELCOME SCREEN ═══ */
.screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;z-index:800;}
.acard{background:var(--s2);border:1.5px solid var(--b2);border-radius:18px;width:100%;max-width:400px;overflow:hidden;animation:pop .25s;}
.acard-head{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(167,139,250,.08));padding:28px 24px 20px;text-align:center;border-bottom:1px solid var(--b1);}
.alogo{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;color:var(--ac2);letter-spacing:3px;margin-bottom:4px;}
.asub{font-size:11px;color:var(--t2);}
.acard-body{padding:22px;}
.atabs{display:flex;background:var(--s3);border-radius:10px;padding:3px;margin-bottom:16px;}
.atab{flex:1;padding:9px;background:transparent;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t3);transition:.15s;}
.atab.on{background:var(--ac);color:#fff;}
.ainp{width:100%;background:var(--s3);border:1.5px solid var(--b2);border-radius:9px;color:var(--t1);padding:12px 14px;font-size:13px;margin-bottom:10px;transition:.15s;display:block;}
.ainp:focus{border-color:var(--ac);background:#1c1c30;}
.ainp::placeholder{color:var(--t3);}
.abtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--ac),#7c3aed);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.abtn:active{transform:scale(.97);}
.abtn:disabled{background:var(--b2);color:var(--t3);cursor:not-allowed;transform:none;}
.abtn.ghost{background:var(--s3);border:1.5px solid var(--b2);color:var(--t1);}
.abtn.ghost:active{transform:scale(.97);}
.aerr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 12px;font-size:11px;color:#f87171;margin-bottom:12px;line-height:1.6;}
.aok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:10px 12px;font-size:11px;color:#6ee7b7;margin-bottom:12px;line-height:1.6;}
.adiv{text-align:center;font-size:10px;color:var(--t3);margin:10px 0;position:relative;}
.adiv::before,.adiv::after{content:"";position:absolute;top:50%;width:38%;height:1px;background:var(--b2);}
.adiv::before{left:0;}.adiv::after{right:0;}
.alink{color:var(--ac2);cursor:pointer;font-size:11px;background:none;border:none;text-decoration:underline;}

/* ═══ USER PROFILE PAGE ═══ */
.profile-page{flex:1;overflow-y:auto;padding:16px;}
.profile-hero{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(167,139,250,.06));border:1px solid rgba(99,102,241,.2);border-radius:16px;padding:20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.profile-av{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--pu));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid rgba(99,102,241,.4);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;margin-bottom:2px;}
.stat-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;}
.pcard{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-bottom:10px;}
.pcard-title{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.wf-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s3);border:1px solid var(--b1);border-radius:9px;margin-bottom:6px;cursor:pointer;transition:.12s;}
.wf-row:hover{border-color:var(--b3);}
.wf-row:active{transform:scale(.98);}

.uav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--pu));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}

/* ═══ MAIN APP TOPBAR ═══ */
.topbar{background:var(--s1);border-bottom:1px solid var(--b1);height:50px;display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;position:relative;}
.logo{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;color:var(--ac2);letter-spacing:2px;flex-shrink:0;}
.wfname{background:transparent;color:var(--t1);font-size:12px;padding:4px 8px;border:1px solid transparent;border-radius:5px;flex:1;min-width:0;}
.wfname:focus{border-color:var(--ac);background:var(--s3);}
.ibtn{width:32px;height:32px;background:transparent;border:1px solid var(--b1);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.12s;flex-shrink:0;}
.ibtn:hover{border-color:var(--b3);}
.ibtn:active{transform:scale(.92);}
.run-btn{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border-radius:8px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;border:none;white-space:nowrap;flex-shrink:0;}
.run-btn:active{transform:scale(.96);}
.run-btn:disabled{background:var(--b2);color:var(--t3);cursor:not-allowed;transform:none;}

/* ═══ TABS ═══ */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;}
.tab{flex:1;padding:9px 0;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:10px;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;font-weight:500;transition:.1s;}
.tab.on{color:var(--ac2);border-bottom-color:var(--ac2);}
.badge{background:var(--ac);color:#fff;font-size:8px;padding:1px 4px;border-radius:8px;margin-left:3px;font-weight:700;}

/* ═══ FLOW ═══ */
.flow-scroll{flex:1;overflow-y:auto;}
.flow-inner{padding:12px 10px 100px;}
.nc{background:var(--s2);border:1.5px solid var(--b1);border-radius:12px;margin-bottom:5px;overflow:hidden;transition:border-color .15s;animation:pop .15s;}
.nc.sel{border-color:var(--ac)!important;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.nc.run{border-color:var(--yw)!important;}.nc.done{border-color:var(--gn)!important;}.nc.err{border-color:var(--rd)!important;}
.nc.off{opacity:.4;}
.nh{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;user-select:none;}
.ni{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-family:monospace;}
.nprev{font-size:10px;color:var(--t3);padding:0 13px 9px;word-break:break-all;line-height:1.5;font-family:monospace;}
.cfg{border-top:1px solid var(--b1);padding:13px;background:var(--s1);animation:fade .1s;}
.fl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;margin-top:11px;display:block;}
.fl:first-child{margin-top:0;}
.fi{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:6px;color:var(--t1);padding:8px 10px;font-size:12px;font-family:monospace;transition:.12s;}
.fi:focus{border-color:var(--ac);}
.fta{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:6px;color:var(--t1);padding:8px 10px;font-size:11px;resize:vertical;min-height:70px;line-height:1.6;font-family:monospace;transition:.12s;}
.fta:focus{border-color:var(--ac);}
.fse{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:6px;color:var(--t1);padding:8px 10px;font-size:12px;}
.hint{font-size:10px;color:var(--t3);margin-top:4px;line-height:1.5;}
.wbox{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:8px 10px;font-size:10px;color:#fcd34d;line-height:1.6;margin-bottom:8px;}
.ibox{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.18);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--ac3);line-height:1.7;margin-top:6px;}
.sbox{background:var(--bg);border:1px solid rgba(16,185,129,.25);border-radius:6px;padding:9px 11px;font-size:11px;color:#6ee7b7;font-family:monospace;max-height:170px;overflow-y:auto;white-space:pre-wrap;line-height:1.6;margin-top:5px;word-break:break-word;}
.cbtn{padding:6px 11px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid;font-weight:500;background:transparent;transition:.1s;}
.cbtn:active{transform:scale(.93);}
.mode-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;margin-bottom:3px;cursor:pointer;font-size:12px;border:1px solid var(--b1);background:var(--s3);transition:.1s;user-select:none;}
.tog{width:36px;height:20px;background:var(--b2);border-radius:10px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.tog.on{background:var(--gn);}
.tog::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s;}
.tog.on::after{left:18px;}
.add-bar{background:var(--s1);border-top:1px solid var(--b1);padding:7px 10px 10px;flex-shrink:0;}
.chips{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;}
.chips::-webkit-scrollbar{height:0;}
.chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1px solid;transition:.1s;font-weight:500;}
.chip:active{transform:scale(.93);}
.conn{display:flex;flex-direction:column;align-items:center;padding:2px 0;}
.final-out{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:13px;margin-top:8px;}

/* ═══ LOGS ═══ */
.logs-wrap{flex:1;overflow-y:auto;}
.lrow{display:flex;gap:8px;padding:3px 13px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.02);word-break:break-word;font-family:monospace;}
.lt{color:var(--t3);flex-shrink:0;min-width:55px;font-size:10px;padding-top:1px;}

/* ═══ TEMPLATES ═══ */
.tmpl-wrap{flex:1;overflow-y:auto;padding:12px;}
.tcard{background:var(--s2);border:1.5px solid var(--b1);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;transition:.15s;}
.tcard:hover{border-color:var(--ac);}
.tcard:active{transform:scale(.98);}
.ttag{padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;}

/* ═══ SETTINGS ═══ */
.stg-wrap{flex:1;overflow-y:auto;padding:12px;}
.scard{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-bottom:10px;}
.stit{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;}

/* ═══ HISTORY ═══ */
.hist-wrap{flex:1;overflow-y:auto;padding:12px;}
.hcard{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px;margin-bottom:7px;}

/* ═══ USER DROPDOWN ═══ */
.udrop{position:absolute;top:53px;right:10px;background:var(--s2);border:1px solid var(--b2);border-radius:11px;z-index:300;min-width:190px;box-shadow:0 6px 24px rgba(0,0,0,.6);animation:pop .15s;overflow:hidden;}
.udrop-head{padding:12px 14px;border-bottom:1px solid var(--b1);background:var(--s3);}
.udrop-item{padding:11px 14px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:9px;transition:.1s;}
.udrop-item:hover{background:var(--s3);}

/* ═══ MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;animation:fade .12s;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px 16px 0 0;width:100%;max-height:88dvh;overflow-y:auto;}
.mhandle{width:36px;height:3px;background:var(--b2);border-radius:2px;margin:12px auto 12px;}
.mtitle{font-size:14px;font-weight:700;padding:0 16px 12px;border-bottom:1px solid var(--b1);margin-bottom:12px;}
.mpanel{padding:0 16px 20px;}
.mopt{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:9px;margin-bottom:6px;cursor:pointer;transition:.12s;}
.mopt:hover{border-color:var(--b3);}
.mopt:active{transform:scale(.97);}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:9px 16px;font-size:12px;z-index:999;animation:pop .2s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;}

/* ═══ PROGRESS ═══ */
.prog{height:2px;background:var(--b1);flex-shrink:0;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .3s;}
.onboard{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.05));border:1px solid rgba(99,102,241,.18);border-radius:12px;padding:20px;margin-bottom:12px;text-align:center;}
</style>
</head>
<body><div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ════════════════════════════
// FIREBASE
// ════════════════════════════
let db=null,fbAuth=null,FB=false;
try{
  if(window.firebase&&window.FB_CFG?.apiKey!=="YOUR_API_KEY"){
    firebase.initializeApp(window.FB_CFG);
    fbAuth=firebase.auth();
    db=firebase.firestore();
    FB=true;
  }
}catch(e){console.warn("Firebase:",e);}

const isAdmin=()=>false; // Admin panel is at admin.html

// ════════════════════════════
// CLOUD HELPERS
// ════════════════════════════
const TS=()=>FB?firebase.firestore.FieldValue.serverTimestamp():new Date().toISOString();
async function csave(uid,wf){if(!DB(uid))return false;try{await db.collection("users").doc(uid).collection("workflows").doc(wf.id).set({...wf,updatedAt:TS()});return true;}catch{return false;}}
async function cload(uid){if(!DB(uid))return[];try{const s=await db.collection("users").doc(uid).collection("workflows").orderBy("updatedAt","desc").limit(30).get();return s.docs.map(d=>({...d.data(),id:d.id}));}catch{return[];}}
async function cdel(uid,id){if(!DB(uid))return;try{await db.collection("users").doc(uid).collection("workflows").doc(id).delete();}catch{}}
async function ckey(uid,k){if(!DB(uid))return;try{await db.collection("users").doc(uid).set({groqKey:k,updatedAt:TS()},{merge:true});}catch{}}
async function cgetkey(uid){if(!DB(uid))return null;try{const d=await db.collection("users").doc(uid).get();return d.data()?.groqKey||null;}catch{return null;}}
async function cprofile(uid,data){if(!DB(uid))return;try{await db.collection("users").doc(uid).set({...data,updatedAt:TS()},{merge:true});}catch{}}
function DB(uid){return FB&&db;}

// ════════════════════════════
// HELPERS
// ════════════════════════════
let UID=100;
const mkId=()=>String(++UID)+(Math.random()*9999|0);
const clone=o=>JSON.parse(JSON.stringify(o));
const buildEdges=arr=>arr.slice(0,-1).map((_,i)=>({src:arr[i].id,tgt:arr[i+1].id}));
const INIT=()=>({
  nodes:[
    {id:"1",type:"manual",   cfg:{name:"Start"},off:false,out:null,st:null},
    {id:"2",type:"ai_agent", cfg:{name:"AI Agent",sys:"You are a helpful assistant.",msg:"Say hello warmly in Bengali!",model:"llama-3.3-70b-versatile",maxT:500},off:false,out:null,st:null},
    {id:"3",type:"output",   cfg:{name:"Result"},off:false,out:null,st:null},
  ],
  edges:[{src:"1",tgt:"2"},{src:"2",tgt:"3"}],
});
const DEFS={
  manual:     {l:"Manual Trigger",i:"▶",c:"#10b981",cat:"trigger",d:"ম্যানুয়ালি শুরু"},
  webhook:    {l:"Webhook",       i:"⚡",c:"#22d3ee",cat:"trigger",d:"HTTP trigger"},
  ai_agent:   {l:"AI Agent",     i:"✦", c:"#818cf8",cat:"ai",     d:"Groq AI — Free"},
  ai_chain:   {l:"AI Chain 2x",  i:"⛓",c:"#a78bfa",cat:"ai",     d:"২টি AI step"},
  ai_decision:{l:"AI Decision",  i:"🧠",c:"#c084fc",cat:"ai",     d:"AI yes/no decide"},
  http:       {l:"HTTP Request", i:"🌐",c:"#4f46e5",cat:"action", d:"API call করো"},
  code:       {l:"Code (JS)",    i:"{}",c:"#fb923c",cat:"action", d:"JS চালাও"},
  delay:      {l:"Delay",        i:"⏳",c:"#94a3b8",cat:"action", d:"Wait করো"},
  loop:       {l:"Repeat N×",    i:"↻", c:"#f59e0b",cat:"action", d:"N বার repeat"},
  transform:  {l:"Transform",    i:"⚙", c:"#fbbf24",cat:"data",   d:"Text format"},
  condition:  {l:"IF Condition", i:"◇", c:"#60a5fa",cat:"data",   d:"Condition check"},
  json_parse: {l:"JSON Parser",  i:"{}", c:"#34d399",cat:"data",  d:"JSON extract"},
  set_var:    {l:"Set Variable", i:"x=",c:"#94a3b8",cat:"data",   d:"Template format"},
  email:      {l:"Send Email",   i:"✉", c:"#fb923c",cat:"output", d:"EmailJS email"},
  slack:      {l:"Slack",        i:"S", c:"#4ade80",cat:"output", d:"Slack message"},
  output:     {l:"Output",       i:"◉", c:"#f87171",cat:"output", d:"Result দেখো"},
  note:       {l:"Note",         i:"📝",c:"#fbbf24",cat:"util",   d:"Workflow note"},
};
const TEMPLATES=[

// CONDITION EVAL
// ════════════════════════════
function evalCond(field,op,val,input){
  try{
    const v=new Function("input","return ("+field+")")(input);
    switch(op){
      case ">": return Number(v)>Number(val);
      case ">=":return Number(v)>=Number(val);
      case "<": return Number(v)<Number(val);
      case "<=":return Number(v)<=Number(val);
      case "==":return String(v)===String(val);
      case "!=":return String(v)!==String(val);
      case "contains":    return String(v).toLowerCase().includes(val.toLowerCase());
      case "not_contains":return !String(v).toLowerCase().includes(val.toLowerCase());
      case "starts_with": return String(v).startsWith(val);
      case "ends_with":   return String(v).endsWith(val);
      case "is_empty":    return !String(v).trim();
      case "not_empty":   return !!String(v).trim();
      default:return true;
    }
  }catch{return false;}
}

// ════════════════════════════
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("welcome");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [pass2,setPass2]=useState("");
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");

  const fe=m=>{
    if(m.includes("email-already"))return"এই email এ account আছে।";
    if(m.includes("wrong-password")||m.includes("invalid-credential"))return"Email বা Password ভুল।";
    if(m.includes("user-not-found"))return"কোনো account নেই। Register করো।";
    if(m.includes("weak-password"))return"Password কমপক্ষে ৬ character।";
    if(m.includes("invalid-email"))return"সঠিক email দাও।";
    if(m.includes("too-many-requests"))return"কিছুক্ষণ পরে try করো।";
    return m.split("/").pop()||m;
  };

  const doSubmit=async()=>{
    setErr("");setOk("");
    if(!email.trim()){setErr("Email দাও");return;}
    if(mode==="register"&&!name.trim()){setErr("নাম দাও");return;}
    if(mode!=="forgot"&&!pass){setErr("Password দাও");return;}
    if(mode==="register"&&pass!==pass2){setErr("Password দুটো মিলছে না।");return;}
    setLoading(true);
    try{
      if(!FB)throw new Error("Firebase config নেই। index.html এ config বসাও।");
      if(mode==="login"){
        const r=await fbAuth.signInWithEmailAndPassword(email.trim(),pass);
        onAuth(r.user);
      }else if(mode==="register"){
        const r=await fbAuth.createUserWithEmailAndPassword(email.trim(),pass);
        await r.user.updateProfile({displayName:name.trim()});
        await cprofile(r.user.uid,{name:name.trim(),email:email.trim(),role:"user",createdAt:TS()});
        onAuth(r.user);
      }else{
        await fbAuth.sendPasswordResetEmail(email.trim());
        setOk("✓ Password reset email পাঠানো হয়েছে!");
      }
    }catch(e){setErr(fe(e.message||String(e)));}
    finally{setLoading(false);}
  };

  const doGoogle=async()=>{
    setErr("");setLoading(true);
    try{
      if(!FB)throw new Error("Firebase config নেই।");
      const p=new firebase.auth.GoogleAuthProvider();
      const r=await fbAuth.signInWithPopup(p);
      await cprofile(r.user.uid,{name:r.user.displayName||"",email:r.user.email||"",role:"user",updatedAt:TS()});
      onAuth(r.user);
    }catch(e){if(!e.message.includes("popup-closed"))setErr(fe(e.message));}
    finally{setLoading(false);}
  };

  const Spinner=()=><span style={{width:14,height:14,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin .6s linear infinite"}}/>;

  // Welcome page
  if(mode==="welcome") return(
    <div className="screen" style={{background:"linear-gradient(160deg,#08080e 60%,#0f0a1e)"}}>
      <div style={{textAlign:"center",marginBottom:32,animation:"pop .3s"}}>
        <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:32,fontWeight:700,color:"var(--ac2)",letterSpacing:4,marginBottom:8}}>FLOW<span style={{color:"var(--pu)"}}>AI</span></div>
        <div style={{fontSize:13,color:"var(--t2)",marginBottom:4}}>AI Workflow Builder</div>
        <div style={{fontSize:11,color:"var(--t3)"}}>Build powerful AI workflows — for free</div>
      </div>
      <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:10}}>
        <button className="abtn" onClick={()=>setMode("register")} style={{fontSize:14,padding:"15px"}}>✨ নতুন Account খোলো</button>
        <button className="abtn ghost" onClick={()=>setMode("login")} style={{fontSize:13,padding:"13px"}}>🔐 Login করো</button>
        {FB&&<>
          <div className="adiv">অথবা</div>
          <button onClick={doGoogle} disabled={loading} className="abtn ghost" style={{fontSize:13,padding:"13px"}}>
            {loading?<Spinner/>:<><span style={{fontSize:16,fontWeight:700,color:"#4285f4",fontFamily:"sans-serif"}}>G</span> Google দিয়ে Continue</>}
          </button>
        </>}
        {!FB&&<div className="aerr" style={{marginTop:4}}>⚠ Firebase config দেওয়া নেই। index.html এর উপরে <strong>FB_CFG</strong> section এ বসাও।</div>}
      </div>
    </div>
  );

  return(
    <div className="screen">
      <div className="acard">
        <div className="acard-head">
          <div className="alogo">FLOWAI</div>
          <div className="asub">{mode==="login"?"আবার স্বাগতম!":mode==="register"?"Account তৈরি করো":"Password Reset"}</div>
        </div>
        <div className="acard-body">
          {mode!=="forgot"&&(
            <div className="atabs">
              <button className={`atab ${mode==="login"?"on":""}`} onClick={()=>{setMode("login");setErr("");setOk("");}}>Login</button>
              <button className={`atab ${mode==="register"?"on":""}`} onClick={()=>{setMode("register");setErr("");setOk("");}}>Register</button>
            </div>
          )}
          {mode==="forgot"&&(
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <button onClick={()=>{setMode("login");setErr("");setOk("");}} style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",fontSize:18,lineHeight:1}}>←</button>
              <span style={{fontSize:13,fontWeight:600}}>Password Reset</span>
            </div>
          )}
          {err&&<div className="aerr">⚠ {err}</div>}
          {ok&&<div className="aok">{ok}</div>}
          {mode==="register"&&<input className="ainp" type="text" placeholder="তোমার নাম লেখো" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSubmit()}/>}
          <input className="ainp" type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSubmit()} autoComplete="email"/>
          {mode!=="forgot"&&<input className="ainp" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSubmit()} autoComplete={mode==="login"?"current-password":"new-password"}/>}
          {mode==="register"&&<input className="ainp" type="password" placeholder="Password আবার লেখো" value={pass2} onChange={e=>setPass2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSubmit()}/>}
          <button className="abtn" onClick={doSubmit} disabled={loading||!FB}>
            {loading?<Spinner/>:mode==="login"?"🔐 Login":mode==="register"?"✨ Account খোলো":"📧 Reset Email পাঠাও"}
          </button>
          {mode!=="forgot"&&FB&&<>
            <div className="adiv">অথবা</div>
            <button onClick={doGoogle} disabled={loading} className="abtn ghost">
              {loading?<Spinner/>:<><span style={{fontSize:15,fontWeight:700,color:"#4285f4",fontFamily:"sans-serif"}}>G</span> Google দিয়ে {mode==="login"?"Login":"Register"}</>}
            </button>
          </>}
          <div style={{textAlign:"center",marginTop:14,fontSize:11,color:"var(--t3)"}}>
            {mode==="login"&&<><button className="alink" onClick={()=>{setMode("forgot");setErr("");setOk("");}}>Password ভুলে গেছো?</button> · <button className="alink" onClick={()=>setMode("welcome")}>← Back</button></>}
            {mode==="register"&&<><span>আগে থেকে account আছে? <button className="alink" onClick={()=>{setMode("login");setErr("");setOk("");}}>Login করো</button></span></>}
            {mode==="forgot"&&<button className="alink" onClick={()=>setMode("welcome")}>← Home</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

            <div style={{fontSize:10,color:"var(--t3)",marginTop:4}}>☁ Cloud Sync Active</div>
          </div>
        </div>

        {/* Stats */}
        <div className="stat-grid">
          {[
            {n:workflows.length,l:"Workflows",c:"var(--ac2)"},
            {n:workflows.reduce((a,w)=>(w.nodes?.length||0)+a,0),l:"Total Nodes",c:"var(--pu)"},
            {n:"∞",l:"Runs Left",c:"var(--gn)"},
          ].map(s=>(
            <div key={s.l} className="stat-box">
              <div className="stat-num" style={{color:s.c}}>{s.n}</div>
              <div className="stat-lbl">{s.l}</div>
            </div>
          ))}
        </div>

        {/* API Key */}
        <div className="pcard">
          <div className="pcard-title">🔑 Groq API Key <span style={{fontSize:9,background:"rgba(16,185,129,.12)",color:"var(--gn)",padding:"2px 7px",borderRadius:8,fontWeight:600}}>FREE</span></div>
          <input type="password" value={apiKey} onChange={e=>saveKey(e.target.value)} placeholder="gsk_xxxxxxxxxx — paste here" style={{width:"100%",background:"var(--s3)",border:`1.5px solid ${apiKey?"rgba(16,185,129,.4)":"var(--b2)"}`,borderRadius:8,color:"var(--t1)",padding:"10px 12px",fontSize:12,outline:"none",fontFamily:"monospace"}}/>
          {apiKey?<div style={{fontSize:11,color:"var(--gn)",marginTop:5}}>✓ Key saved · {apiKey.slice(0,12)}…</div>
          :<div style={{fontSize:10,color:"var(--t3)",marginTop:5}}>console.groq.com → API Keys → Create → Paste করো</div>}
        </div>

        {/* Saved Workflows */}
        <div className="pcard">
          <div className="pcard-title">☁ My Workflows ({workflows.length})</div>
          {workflows.length===0
            ?<div style={{textAlign:"center",padding:"20px",color:"var(--t3)",fontSize:11}}>কোনো workflow save করা নেই। ▶ Run করার পর 💾 দিয়ে save করো।</div>
            :workflows.map(wf=>(
              <div key={wf.id} className="wf-row" onClick={()=>onLoad(wf)}>
                <span style={{fontSize:18}}>◈</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{wf.name}</div>
                  <div style={{fontSize:10,color:"var(--t3)"}}>{wf.count||wf.nodes?.length||0} nodes · {wf.at||"—"}</div>
                </div>
                <button onClick={e=>{e.stopPropagation();if(confirm("Delete করবো?"))onDelete(wf.id);}}
                  style={{background:"rgba(239,68,68,.08)",color:"var(--rd)",border:"none",borderRadius:6,padding:"5px 9px",fontSize:10,cursor:"pointer",flexShrink:0}}>✕</button>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════
// MAIN APP (User Workflow Builder)
// ════════════════════════════
function WorkflowApp({user,onLogout}){
  const [tab,setTab]        =useState("flow");
  const [wfName,setWfName]  =useState("My Workflow");
  const [nodes,setNodes]    =useState(()=>INIT().nodes);
  const [edges,setEdges]    =useState(()=>INIT().edges);
  const [selId,setSelId]    =useState(null);
  const [running,setRunning]=useState(false);
  const [prog,setProg]      =useState(0);
  const [logs,setLogs]      =useState([]);
  const [apiKey,setApiKey]  =useState("");
  const [toast,setToast]    =useState(null);
  const [saved,setSaved]    =useState([]);
  const [history,setHistory]=useState([]);
  const [undoStack,setUndo] =useState([]);
  const [addModal,setAddModal]=useState(false);
  const [saveModal,setSaveModal]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [cloudSaving,setCloudSaving]=useState(false);
  const [wfInput,setWfInput]=useState("");
  const [summary,setSummary]=useState(null);
  const [sumLoading,setSumLoading]=useState(false);
  const [sumType,setSumType]=useState("short");
  const [tmplFilter,setTmplFilter]=useState("All");
  const flowRef=useRef(null);
  const toastRef=useRef(null);

  // Load user data
  useEffect(()=>{
    const uid=user.uid;
    (async()=>{
      const [wfs,key]=await Promise.all([cload(uid),cgetkey(uid)]);
      if(wfs.length) setSaved(wfs);
      if(key){setApiKey(key);localStorage.setItem("fai_key",key);}
      else{const lk=localStorage.getItem("fai_key");if(lk)setApiKey(lk);}
      const h=localStorage.getItem("fai_hist_"+uid);if(h)try{setHistory(JSON.parse(h));}catch{}
    })();
  },[user.uid]);

  const t2=useCallback((msg,col="#6ee7b7")=>{
    setToast({msg,col});clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),2600);
  },[]);

  const saveKey=useCallback(k=>{
    setApiKey(k);localStorage.setItem("fai_key",k);
    ckey(user.uid,k);
  },[user.uid]);

  const pushUndo=useCallback(()=>{
    setUndo(p=>[...p.slice(-14),{nodes:clone(nodes),edges:clone(edges),name:wfName}]);
  },[nodes,edges,wfName]);

  const doUndo=useCallback(()=>{
    if(!undoStack.length){t2("Nothing to undo","#f59e0b");return;}
    const l=undoStack[undoStack.length-1];
    setNodes(l.nodes);setEdges(l.edges);setWfName(l.name);
    setUndo(p=>p.slice(0,-1));t2("↩ Undo");
  },[undoStack,t2]);

  const addNode=useCallback(type=>{
    pushUndo();
    const id=mkId();
    const def=DEFS[type];
    const cfg=
      type==="ai_agent"   ?{name:def.l,sys:"You are helpful.",msg:"{{input}}",model:"llama-3.3-70b-versatile",maxT:600}:
      type==="ai_chain"   ?{name:def.l,sys1:"Researcher.",msg1:"Research: {{input}}",sys2:"Writer.",msg2:"Write: {{step1}}",model:"llama-3.3-70b-versatile"}:
      type==="ai_decision"?{name:def.l,criteria:"Is this positive?",model:"llama-3.1-8b-instant"}:
      type==="code"       ?{name:def.l,code:"return input;"}:
      type==="transform"  ?{name:def.l,mode:"uppercase"}:
      type==="condition"  ?{name:def.l,field:"input.length",op:">",val:"0"}:
      type==="http"       ?{name:def.l,method:"GET",url:""}:
      type==="delay"      ?{name:def.l,seconds:"2"}:
      type==="loop"       ?{name:def.l,times:"3",sep:" | "}:
      type==="json_parse" ?{name:def.l,field:"",fallback:"Not found"}:
      type==="set_var"    ?{name:def.l,template:"{{input}}"}:
      type==="note"       ?{name:"Note",text:""}:
      {name:def.l};
    setNodes(prev=>{const n=[...prev,{id,type,cfg,off:false,out:null,st:null}];setEdges(buildEdges(n));return n;});
    setSelId(id);setAddModal(false);
    setTimeout(()=>flowRef.current?.scrollTo({top:99999,behavior:"smooth"}),80);
    t2(`✓ ${def.l} added`);
  },[pushUndo,t2]);

  const delNode=useCallback(id=>{pushUndo();setSelId(p=>p===id?null:p);setNodes(prev=>{const n=prev.filter(x=>x.id!==id);setEdges(buildEdges(n));return n;});t2("🗑 Deleted");},[pushUndo,t2]);
  const dupNode=useCallback(id=>{pushUndo();const n=nodes.find(x=>x.id===id);if(!n)return;const nid=mkId();const nn={...clone(n),id:nid,cfg:{...clone(n.cfg),name:(n.cfg.name||"")+" (copy)"},out:null,st:null};setNodes(prev=>{const i=prev.findIndex(x=>x.id===id);const a=[...prev.slice(0,i+1),nn,...prev.slice(i+1)];setEdges(buildEdges(a));return a;});setSelId(nid);t2("⊕ Duplicated");},[nodes,pushUndo,t2]);
  const moveNode=useCallback((id,dir)=>{pushUndo();setNodes(prev=>{const i=prev.findIndex(x=>x.id===id);if(dir==="up"&&i===0||dir==="down"&&i===prev.length-1)return prev;const a=[...prev];const j=dir==="up"?i-1:i+1;[a[i],a[j]]=[a[j],a[i]];setEdges(buildEdges(a));return a;});},[pushUndo]);
  const toggleOff=useCallback(id=>{setNodes(p=>p.map(n=>n.id===id?{...n,off:!n.off}:n));},[]);
  const updCfg=useCallback((id,cfg)=>{setNodes(p=>p.map(n=>n.id===id?{...n,cfg}:n));},[]);

  const saveWF=useCallback(async()=>{
    const wf={id:mkId(),name:wfName,nodes:clone(nodes),edges:clone(edges),at:new Date().toLocaleString(),count:nodes.length};
    setSaveModal(false);setCloudSaving(true);
    const ok=await csave(user.uid,wf);
    setCloudSaving(false);
    if(ok){setSaved(p=>[wf,...p.slice(0,29)]);t2("☁ Saved to cloud!");}
    else{setSaved(p=>[wf,...p.slice(0,9)]);t2("💾 Saved locally");}
  },[wfName,nodes,edges,user.uid,t2]);

  const loadWF=useCallback(wf=>{
    setNodes(clone(wf.nodes));setEdges(clone(wf.edges));setWfName(wf.name);
    setSelId(null);setLogs([]);setSummary(null);setTab("flow");setShowProfile(false);
    t2(`📂 ${wf.name}`);
  },[t2]);

  const deleteWF=useCallback(async id=>{
    setSaved(p=>p.filter(w=>w.id!==id));
    await cdel(user.uid,id);
    t2("🗑 Deleted");
  },[user.uid,t2]);

  const exportWF=useCallback(()=>{
    const d=JSON.stringify({name:wfName,nodes,edges},null,2);
    const b=new Blob([d],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download=`${wfName.replace(/\s+/g,"-")}.json`;a.click();URL.revokeObjectURL(u);t2("⬇ Exported!");
  },[wfName,nodes,edges,t2]);

  const importWF=useCallback(e=>{
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);setNodes(d.nodes);setEdges(d.edges);setWfName(d.name||"Imported");t2("✓ Imported!");}catch{t2("✕ Invalid JSON","#ef4444");}};
    r.readAsText(f);e.target.value="";
  },[t2]);

  const loadTemplate=useCallback(t=>{
    pushUndo();
    const nm=t.nodes.map(n=>({...clone(n),id:mkId(),out:null,st:null,off:false}));
    setNodes(nm);setEdges(buildEdges(nm));setWfName(t.n);
    setSelId(null);setLogs([]);setSummary(null);setTab("flow");
    t2(`✓ "${t.n}" loaded!`);
  },[pushUndo,t2]);

  const addLog=useCallback((msg,type="info")=>{
    setLogs(p=>[...p,{msg,type,t:new Date().toLocaleTimeString()}]);
  },[]);

  const genSummary=useCallback(async(text,type)=>{
    if(!apiKey){t2("🔑 API Key দাও","#f59e0b");setTab("settings");return;}
    setSumLoading(true);setSummary(null);setSumType(type);
    const prompts={short:"Summarize in 2-3 sentences.",bullets:"5 bullet points with •.",eli5:"Explain simply to a child.",translate:"Translate to Bengali.",formal:"Rewrite formally.",keywords:"Extract 5-10 key phrases."};
    try{
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model:"llama-3.1-8b-instant",max_tokens:500,messages:[{role:"system",content:prompts[type]||prompts.short},{role:"user",content:text.slice(0,3000)}]})});
      const d=await res.json();if(d.error)throw new Error(d.error.message);
      setSummary(d.choices?.[0]?.message?.content||"");t2("✓ Summary ready!");
    }catch(e){t2("✕ "+e.message,"#ef4444");}
    finally{setSumLoading(false);}
  },[apiKey,t2]);

  // ── RUN ──
  const run=useCallback(async()=>{
    const cn=clone(nodes),ce=clone(edges);
    if(!apiKey&&cn.some(n=>["ai_agent","ai_chain","ai_decision"].includes(n.type)&&!n.off)){
      t2("🔑 API Key দাও","#f59e0b");setShowProfile(true);return;
    }
    setRunning(true);setLogs([]);setTab("logs");setProg(0);setSummary(null);
    setNodes(p=>p.map(n=>({...n,st:null,out:null})));
    const trigger=cn.find(n=>["manual","webhook"].includes(n.type)&&!n.off);
    if(!trigger){addLog("❌ Trigger node নেই!","err");setRunning(false);return;}
    const order=[],seen=new Set(),q=[trigger.id];
    while(q.length){const id=q.shift();if(seen.has(id))continue;seen.add(id);order.push(id);ce.filter(e=>e.src===id).forEach(e=>q.push(e.tgt));}
    const exec=order.filter(id=>{const n=cn.find(x=>x.id===id);return n&&!n.off;});
    addLog(`▶ "${wfName}" — ${exec.length} nodes`);
    const outs={};const t0=Date.now();

    for(let ei=0;ei<exec.length;ei++){
      const nid=exec[ei];const node=cn.find(n=>n.id===nid);if(!node)continue;
      if(node.type==="note"){outs[nid]="";continue;}
      setProg(Math.round(ei/exec.length*100));
      setNodes(p=>p.map(n=>n.id===nid?{...n,st:"run"}:n));
      const prev=ce.filter(e=>e.tgt===nid).map(e=>outs[e.src]||"").filter(Boolean).join("\n");
      const def=DEFS[node.type]||{l:node.type};
      addLog(`⟶ [${def.l}] ${node.cfg.name||""}`);
      let result="";
      try{
        if(["manual","webhook"].includes(node.type)){
          result=wfInput||"Triggered ✓";addLog(`  ✓ Fired`,"ok");
        }
        else if(node.type==="ai_agent"){
          const model=node.cfg.model||"llama-3.3-70b-versatile";
          addLog(`  → Groq (${model.slice(0,20)})…`);
          const msg=(node.cfg.msg||"{{input}}").replace(/\{\{input\}\}/g,prev||"Hello");
          const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model,max_tokens:node.cfg.maxT||600,messages:[{role:"system",content:node.cfg.sys||"You are helpful."},{role:"user",content:msg}]})});
          const d=await res.json();if(d.error)throw new Error(d.error.message);
          result=d.choices?.[0]?.message?.content||"";addLog(`  ✓ ${result.length} chars`,"ok");
        }
        else if(node.type==="ai_chain"){
          const model=node.cfg.model||"llama-3.3-70b-versatile";
          addLog("  → Step 1…");
          const m1=(node.cfg.msg1||"{{input}}").replace(/\{\{input\}\}/g,prev||"Hello");
          const r1=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model,max_tokens:500,messages:[{role:"system",content:node.cfg.sys1||""},{role:"user",content:m1}]})});
          const d1=await r1.json();if(d1.error)throw new Error(d1.error.message);
          const step1=d1.choices?.[0]?.message?.content||"";addLog(`  ✓ Step 1: ${step1.length} chars`,"ok");
          addLog("  → Step 2…");
          const m2=(node.cfg.msg2||"{{step1}}").replace(/\{\{step1\}\}/g,step1).replace(/\{\{input\}\}/g,prev||"");
          const r2=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model,max_tokens:700,messages:[{role:"system",content:node.cfg.sys2||""},{role:"user",content:m2}]})});
          const d2=await r2.json();if(d2.error)throw new Error(d2.error.message);
          result=d2.choices?.[0]?.message?.content||"";addLog(`  ✓ Step 2: ${result.length} chars`,"ok");
        }
        else if(node.type==="ai_decision"){
          addLog("  → AI Decision…");
          const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model:node.cfg.model||"llama-3.1-8b-instant",max_tokens:5,messages:[{role:"system",content:`Answer ONLY "yes" or "no". Criteria: ${node.cfg.criteria||"Is this positive?"}`},{role:"user",content:prev||"Hello"}]})});
          const d=await res.json();if(d.error)throw new Error(d.error.message);
          result=(d.choices?.[0]?.message?.content||"no").toLowerCase().trim();addLog(`  ✓ "${result}"`,"ok");
        }
        else if(node.type==="http"){
          if(!node.cfg.url?.trim())throw new Error("URL দাও!");
          addLog(`  → ${node.cfg.method||"GET"} ${node.cfg.url.slice(0,40)}`);
          let headers={"Content-Type":"application/json"};
          if(node.cfg.headers){try{headers={...headers,...JSON.parse(node.cfg.headers)};}catch{}}
          const opts={method:node.cfg.method||"GET",headers};
          if(node.cfg.body&&!["GET","HEAD"].includes(node.cfg.method))opts.body=node.cfg.body.replace(/\{\{input\}\}/g,prev);
          const res=await fetch(node.cfg.url,opts);result=await res.text();addLog(`  ✓ ${res.status} — ${result.length}c`,"ok");
        }
        else if(node.type==="code"){const fn=new Function("input",node.cfg.code||"return input;");result=String(fn(prev)??"")||"";addLog("  ✓ Executed","ok");}
        else if(node.type==="delay"){const s=Math.min(30,parseFloat(node.cfg.seconds)||2);addLog(`  ⏳ ${s}s…`);await new Promise(r=>setTimeout(r,s*1000));result=prev;addLog("  ✓","ok");}
        else if(node.type==="loop"){const n=Math.min(10,parseInt(node.cfg.times)||3);result=Array(n).fill(prev).join(node.cfg.sep!=null?node.cfg.sep:" | ");addLog(`  ✓ ×${n}`,"ok");}
        else if(node.type==="transform"){
          const m=node.cfg.mode||"uppercase";
          switch(m){
            case "uppercase":result=prev.toUpperCase();break;case "lowercase":result=prev.toLowerCase();break;
            case "trim":result=prev.trim();break;case "reverse":result=[...prev].reverse().join("");break;
            case "word_count":result=`${prev.trim().split(/\s+/).filter(Boolean).length} words`;break;
            case "char_count":result=`${prev.length} characters`;break;
            case "title_case":result=prev.replace(/\w\S*/g,t=>t[0].toUpperCase()+t.slice(1).toLowerCase());break;
            case "snake_case":result=prev.trim().toLowerCase().replace(/\s+/g,"_");break;
            case "base64_enc":result=btoa(unescape(encodeURIComponent(prev)));break;
            case "base64_dec":try{result=decodeURIComponent(escape(atob(prev)));}catch{result="[Invalid base64]";}break;
            default:result=prev;
          }
          addLog(`  ✓ ${m}`,"ok");
        }
        else if(node.type==="condition"){const pass=evalCond(node.cfg.field||"input.length",node.cfg.op||">",node.cfg.val||"0",prev);result=pass?prev:"";addLog(`  ${pass?"✓ PASS":"✗ FAIL"}`,pass?"ok":"warn");}
        else if(node.type==="json_parse"){
          try{let o=JSON.parse(prev);const ks=(node.cfg.field||"").split(".").filter(Boolean);for(const k of ks){if(o&&k in Object(o))o=o[k];else{o=undefined;break;}}result=o!=null?(typeof o==="object"?JSON.stringify(o,null,2):String(o)):node.cfg.fallback||"Not found";}catch{result=node.cfg.fallback||"Parse error";}
          addLog("  ✓ Extracted","ok");
        }
        else if(node.type==="set_var"){result=(node.cfg.template||"{{input}}").replace(/\{\{input\}\}/g,prev);addLog("  ✓","ok");}
        else if(node.type==="email"){
          const{provider,serviceId,templateId,publicKey,to,subject,message}=node.cfg;
          const body=(message||"{{input}}").replace(/\{\{input\}\}/g,prev);
          if(provider==="simulate"){await new Promise(r=>setTimeout(r,500));result=`✉ [Simulated] → ${to||"?"}`;addLog("  ✓ Simulated","ok");}
          else if(serviceId&&templateId&&publicKey&&to){
            if(!window.emailjs){await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";s.onload=res;s.onerror=()=>rej(new Error("EmailJS load failed"));document.head.appendChild(s);});window.emailjs.init({publicKey});}
            const r=await window.emailjs.send(serviceId,templateId,{to_email:to,subject:subject||"FlowAI",message:body},{publicKey});
            result=`✉ Sent to ${to}`;addLog("  ✓ Email sent!","ok");
          }else throw new Error("Email config পুরো দাও অথবা Simulate mode ব্যবহার করো।");
        }
        else if(node.type==="slack"){
          if(node.cfg.webhookUrl){const msg=(node.cfg.message||"{{input}}").replace(/\{\{input\}\}/g,prev);const res=await fetch(node.cfg.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:msg})});result=res.ok?"✓ Slack sent":"Slack error";addLog(res.ok?"  ✓":"  ✕ Slack",res.ok?"ok":"err");}
          else{result="[Slack simulated]";addLog("  ⚠ No URL","warn");}
        }
        else if(node.type==="output"){result=prev||"(no input)";addLog("  ✓ Output","ok");}
        outs[nid]=result;
        setNodes(p=>p.map(n=>n.id===nid?{...n,st:"done",out:result}:n));
        await new Promise(r=>setTimeout(r,180));
      }catch(e){
        const msg=String(e.message||e);addLog(`  ✕ ${msg}`,"err");
        setNodes(p=>p.map(n=>n.id===nid?{...n,st:"err",out:"ERROR: "+msg}:n));
        outs[nid]="";
      }
    }
    const elapsed=((Date.now()-t0)/1000).toFixed(1);
    addLog("─────────────","info");addLog(`✅ Done — ${elapsed}s`,"ok");
    setProg(100);setRunning(false);
    const lastResult=Object.values(outs).filter(Boolean).slice(-1)[0]||"";
    const he={id:mkId(),name:wfName,elapsed,at:new Date().toLocaleTimeString(),count:exec.length,preview:lastResult.slice(0,80)};
    setHistory(p=>{const n=[he,...p.slice(0,14)];localStorage.setItem("fai_hist_"+user.uid,JSON.stringify(n));return n;});
    t2(`✅ Done in ${elapsed}s`);setTab("flow");
  },[nodes,edges,apiKey,wfName,wfInput,addLog,t2,user.uid]);

  const lastOut=nodes.filter(n=>n.st==="done"&&n.out&&!["manual","webhook","note"].includes(n.type)).slice(-1)[0]?.out;
  const doneN=nodes.filter(n=>n.st==="done").length;
  const errN=nodes.filter(n=>n.st==="err").length;
  const filteredTmpls=TEMPLATES.filter(t=>tmplFilter==="All"||t.dif===tmplFilter||t.tags.includes(tmplFilter));

  if(showProfile) return(

          <div className="flow-inner">
            {!apiKey&&(
              <div onClick={()=>setShowProfile(true)} style={{background:"linear-gradient(135deg,rgba(245,158,11,.12),rgba(251,146,60,.08))",border:"1px solid rgba(245,158,11,.3)",borderRadius:10,padding:"11px 13px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>🔑</span>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:"#fcd34d"}}>Groq API Key দাও</div><div style={{fontSize:10,color:"var(--t2)"}}>AI চালাতে free key লাগবে → Profile tap করো</div></div>

            {nodes.length>0&&(

                <textarea value={wfInput} onChange={e=>setWfInput(e.target.value)} placeholder="কী জানতে চাও? এখানে লেখো..." style={{width:"100%",background:"var(--s3)",border:"1px solid var(--b2)",borderRadius:7,color:"var(--t1)",padding:"8px 10px",fontSize:12,resize:"none",minHeight:52,lineHeight:1.6,outline:"none",fontFamily:"inherit"}}/>

                          <button className="cbtn" onClick={()=>delNode(node.id)} style={{color:"var(--rd)",borderColor:"rgba(239,68,68,.2)",marginLeft:"auto"}}>🗑</button>
                        </div>
                      </div>

                      <div style={{width:2,height:7,background:node.st==="done"?"var(--gn)":"var(--b2)"}}/>

                    </div>

                        {ic} {l}

                  {!sumLoading&&summary&&<div style={{animation:"pop .2s"}}>
                    <div style={{background:"rgba(99,102,241,.06)",border:"1px solid rgba(99,102,241,.18)",borderRadius:8,padding:"10px",fontSize:12,lineHeight:1.8,whiteSpace:"pre-wrap",wordBreak:"break-word",marginBottom:7}}>{summary}</div>
                    <button onClick={()=>navigator.clipboard?.writeText(summary).then(()=>t2("📋 Copied!"))} style={{padding:"7px 14px",background:"rgba(99,102,241,.1)",color:"var(--ac2)",border:"1px solid rgba(99,102,241,.2)",borderRadius:7,fontSize:11,cursor:"pointer"}}>📋 Copy Summary</button>
                  </div>}

                </div>
              </div>
            )}
          </div>
        </div>
        <div className="add-bar">
          <div className="chips">
            <div className="chip" style={{color:"var(--ac2)",borderColor:"rgba(99,102,241,.3)",background:"rgba(99,102,241,.1)",fontWeight:700}} onClick={()=>setAddModal(true)}>+ Add</div>
            {Object.entries(DEFS).map(([type,def])=>(
              <div key={type} className="chip" style={{color:def.c,borderColor:def.c+"30",background:def.c+"0c"}} onClick={()=>addNode(type)}>
                <span style={{fontFamily:"monospace"}}>{def.i}</span><span>{def.l}</span>
              </div>
            ))}
          </div>
        </div>
      </div>}

      {tab==="tmpl"&&<div className="tmpl-wrap">
        <div style={{display:"flex",gap:5,marginBottom:10,overflow:"auto"}}>
          {["All","Beginner","Intermediate","Advanced","AI","API"].map(f=>(
            <div key={f} onClick={()=>setTmplFilter(f)} style={{padding:"4px 11px",borderRadius:20,border:"1px solid",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",flexShrink:0,color:tmplFilter===f?"var(--ac2)":"var(--t3)",borderColor:tmplFilter===f?"rgba(99,102,241,.4)":"var(--b1)",background:tmplFilter===f?"rgba(99,102,241,.08)":"transparent"}}>{f}</div>

        </div>

          <div key={t.id} className="tcard" onClick={()=>loadTemplate(t)}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontSize:24,flexShrink:0}}>{t.e}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <span style={{fontSize:13,fontWeight:700}}>{t.n}</span>
                  <span style={{fontSize:9,padding:"1px 6px",borderRadius:8,fontWeight:700,background:t.dif==="Beginner"?"rgba(16,185,129,.15)":t.dif==="Advanced"?"rgba(239,68,68,.15)":"rgba(245,158,11,.15)",color:t.dif==="Beginner"?"var(--gn)":t.dif==="Advanced"?"var(--rd)":"var(--yw)"}}>{t.dif}</span>

                <div style={{fontSize:11,color:"var(--t2)",lineHeight:1.5,marginBottom:5}}>{t.desc}</div>
                <div style={{fontSize:10,color:"var(--t3)",fontFamily:"monospace",background:"var(--bg)",padding:"4px 7px",borderRadius:5}}>{t.flow}</div>
                <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>
                  {t.tags.map((tag,i)=><span key={tag} className="ttag" style={{background:t.tc[i]+"18",color:t.tc[i],border:`1px solid ${t.tc[i]}30`}}>{tag}</span>)}

              </div>
              <div style={{background:"rgba(99,102,241,.12)",color:"var(--ac2)",border:"1px solid rgba(99,102,241,.25)",borderRadius:6,padding:"5px 9px",fontSize:10,flexShrink:0,fontWeight:700}}>Load →</div>
            </div>
          </div>

      </div>}

      {tab==="logs"&&<div className="logs-wrap" style={{flex:1}}>

      {tab==="hist"&&<div className="hist-wrap" style={{flex:1}}>

          <div key={h.id} className="hcard">
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>

              <span style={{fontSize:12,fontWeight:600,flex:1}}>{h.name}</span>
              <span style={{fontSize:10,color:"var(--t3)"}}>{h.at}</span>
            </div>
            <div style={{fontSize:10,color:"var(--t3)",marginBottom:h.preview?4:0}}>{h.count} nodes · {h.elapsed}s</div>
            {h.preview&&<div style={{fontSize:10,color:"var(--t2)",fontFamily:"monospace",background:"var(--bg)",padding:"5px 7px",borderRadius:4,lineHeight:1.5}}>{h.preview}{h.preview.length===80?"…":""}</div>}
          </div>
        ))}
        {history.length>0&&<button onClick={()=>{setHistory([]);localStorage.removeItem("fai_hist_"+user.uid);t2("🗑 Cleared");}} style={{width:"100%",padding:"9px",background:"rgba(239,68,68,.07)",color:"var(--rd)",border:"1px solid rgba(239,68,68,.15)",borderRadius:7,fontSize:11,cursor:"pointer"}}>Clear History</button>}
      </div>}

            <button onClick={exportWF} style={{padding:"9px",background:"rgba(99,102,241,.1)",color:"var(--ac2)",border:"1px solid rgba(99,102,241,.2)",borderRadius:7,fontSize:11,cursor:"pointer"}}>⬇ Export</button>

          <button onClick={onLogout} style={{width:"100%",padding:"9px",background:"rgba(239,68,68,.07)",color:"var(--rd)",border:"1px solid rgba(239,68,68,.15)",borderRadius:7,fontSize:11,cursor:"pointer"}}>🚪 Logout</button>
        </div>

              Object.entries(Object.entries(DEFS).reduce((acc,[type,def])=>{(acc[def.cat]=acc[def.cat]||[]).push([type,def]);return acc;},{})).map(([cat,items])=>(

                      <div style={{width:28,height:28,borderRadius:6,background:def.c+"18",color:def.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontFamily:"monospace",flexShrink:0}}>{def.i}</div>
                      <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{def.l}</div><div style={{fontSize:10,color:"var(--t3)"}}>{def.d}</div></div>
                      <span style={{color:"var(--t3)"}}>+</span>
                    </div>
                  ))}
                </div>
              ))

          </div>
        </div>
      </div>}

      {/* ── SAVE MODAL ── */}

            <div style={{fontSize:11,color:"var(--t3)",marginBottom:12}}>{nodes.length} nodes · ☁ Cloud এ save হবে</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveWF} style={{flex:1,padding:"12px",background:"linear-gradient(135deg,var(--ac),var(--ac2))",color:"#fff",border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer"}}>☁ Save</button>
              <button onClick={()=>setSaveModal(false)} style={{flex:1,padding:"12px",background:"var(--s3)",color:"var(--t2)",border:"1px solid var(--b1)",borderRadius:9,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      </div>}

      {toast&&<div className="toast" style={{color:toast.col}}>{toast.msg}</div>}
    </div>
  );
}

// ════════════════════════════
// ROOT — decides which panel to show
// ════════════════════════════
function Root(){
  const [user,setUser]=useState(undefined);

  useEffect(()=>{
    if(!FB){setUser(null);return;}
    const unsub=fbAuth.onAuthStateChanged(u=>setUser(u||null));
    return()=>unsub();
  },[]);

  const logout=async()=>{if(fbAuth)await fbAuth.signOut();setUser(null);};

  // Loading
  if(user===undefined) return(
    <div style={{height:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",gap:12}}>
      <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:24,fontWeight:700,color:"var(--ac2)",letterSpacing:3}}>FLOWAI</div>
      <div style={{width:22,height:22,border:"2px solid var(--ac)",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
    </div>
  );

  // Not logged in
  if(!user) return <AuthScreen onAuth={u=>setUser(u)}/>;

  // Banned user
  if(user.banned) return(
    <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,padding:20}}>
      <span style={{fontSize:40}}>🚫</span>
      <div style={{fontSize:14,fontWeight:600,color:"var(--rd)"}}>Account Suspended</div>
      <div style={{fontSize:11,color:"var(--t3)",textAlign:"center"}}>তোমার account suspend করা হয়েছে।</div>
      <button onClick={logout} style={{padding:"9px 20px",background:"var(--s2)",border:"1px solid var(--b2)",borderRadius:8,color:"var(--t2)",cursor:"pointer",fontSize:12}}>Logout</button>
    </div>
  );

  return <WorkflowApp user={user} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
