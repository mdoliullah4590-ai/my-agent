  --bg:#05050f;--s1:#0a0a18;--s2:#0f0f20;--s3:#141428;

.ainp{width:100%;background:var(--s3);border:1.5px solid var(--b2);border-radius:9px;color:var(--t1);padding:12px 14px;font-size:13px;margin-bottom:10px;transition:.15s;display:block;}

.logout-btn{padding:6px 12px;background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:7px;font-size:11px;cursor:pointer;transition:.12s;}

/* ══ USER CARD ══ */

.ucard:last-child{border-bottom:none;}

/* ══ TOAST ══ */

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ════════════════════════════
// FIREBASE INIT
// ════════════════════════════
let db=null,fbAuth=null,FB=false;
try{
  if(window.firebase&&window.FB_CFG?.apiKey!=="YOUR_API_KEY"){
    firebase.initializeApp(window.FB_CFG);
    fbAuth=firebase.auth();
    db=firebase.firestore();
    FB=true;
  }
}catch(e){console.warn("Firebase:",e);}

const isAdmin=email=>(window.ADMIN_EMAILS||[]).includes(email);
const TS=()=>FB?firebase.firestore.FieldValue.serverTimestamp():new Date().toISOString();

// ════════════════════════════
// FIREBASE HELPERS
// ════════════════════════════
async function getAllUsers(){
  if(!db)return[];
  try{
    const s=await db.collection("users").orderBy("createdAt","desc").get();
    return s.docs.map(d=>({...d.data(),uid:d.id}));
  }catch(e){
    // If no index, fallback without order
    try{const s=await db.collection("users").get();return s.docs.map(d=>({...d.data(),uid:d.id}));}
    catch{return[];}
  }
}
async function getUserWFs(uid){
  if(!db)return[];
  try{const s=await db.collection("users").doc(uid).collection("workflows").get();return s.docs.map(d=>({...d.data(),id:d.id}));}
  catch{return[];}
}
async function banUser(uid,banned){
  if(!db)return;
  try{await db.collection("users").doc(uid).set({banned,bannedAt:banned?TS():null},{merge:true});}catch(e){throw e;}
}
async function deleteUser(uid){
  if(!db)return;
  // Delete all workflows first
  try{
    const wfs=await db.collection("users").doc(uid).collection("workflows").get();
    const batch=db.batch();
    wfs.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    await db.collection("users").doc(uid).delete();
  }catch(e){throw e;}
}
async function deleteWF(uid,wfId){
  if(!db)return;
  try{await db.collection("users").doc(uid).collection("workflows").doc(wfId).delete();}catch(e){throw e;}
}
async function getStats(){
  if(!db)return{total:0,today:0,banned:0,wfTotal:0};
  try{
    const users=await getAllUsers();
    const today=new Date().toDateString();
    const todayCount=users.filter(u=>{
      const d=u.createdAt?.toDate?.();
      return d&&d.toDateString()===today;
    }).length;
    // Get total workflows
    let wfTotal=0;
    for(const u of users.slice(0,20)){
      try{const s=await db.collection("users").doc(u.uid).collection("workflows").get();wfTotal+=s.size;}catch{}
    }
    return{total:users.length,today:todayCount,banned:users.filter(u=>u.banned).length,wfTotal};
  }catch{return{total:0,today:0,banned:0,wfTotal:0};}
}

// ════════════════════════════
// LOGIN COMPONENT
// ════════════════════════════
function Login({onLogin}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const submit=async()=>{
    setErr("");
    if(!email.trim()||!pass){setErr("Email এবং Password দাও");return;}
    setLoading(true);
    try{
      if(!FB)throw new Error("Firebase config দাও। admin.html এ FB_CFG বসাও।");
      const r=await fbAuth.signInWithEmailAndPassword(email.trim(),pass);
      if(!isAdmin(r.user.email)){
        await fbAuth.signOut();
        throw new Error("এই account এ Admin access নেই। ADMIN_EMAILS এ email add করো।");
      }
      onLogin(r.user);
    }catch(e){
      const m=e.message||"";
      if(m.includes("wrong-password")||m.includes("invalid-credential"))setErr("Email বা Password ভুল।");
      else if(m.includes("user-not-found"))setErr("কোনো account নেই।");
      else setErr(m.split("Firebase:").pop().trim());
    }finally{setLoading(false);}
  };

  return(
    <div className="login-screen">
      <div className="login-card">
        <div className="login-head">
          <div className="login-logo">FLOWAI</div>
          <div className="login-sub">Workflow Builder Platform</div>
          <div className="login-badge">ADMIN PANEL</div>
        </div>
        <div className="login-body">
          {!FB&&<div className="aerr">⚠ Firebase config দাও! <code>admin.html</code> এর উপরে <code>FB_CFG</code> এ তোমার project details বসাও।</div>}
          {err&&<div className="aerr">⚠ {err}</div>}
          <input className="ainp" type="email" placeholder="Admin email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoComplete="email"/>
          <input className="ainp" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoComplete="current-password"/>
          <button className="login-btn" onClick={submit} disabled={loading||!FB}>
            {loading
              ?<><span style={{width:14,height:14,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin .6s linear infinite"}}/> Logging in…</>
              :"🔐 Admin Login"
            }
          </button>
          <div style={{textAlign:"center",marginTop:12,fontSize:10,color:"var(--t3)"}}>
            User panel: <a href="index.html" style={{color:"var(--pu)"}}>index.html →</a>
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════
// DASHBOARD TAB
// ════════════════════════════
function Dashboard({stats,loading,users}){
  // Simple signup chart - last 7 days
  const days=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i);
    return d.toDateString();
  }).reverse();

  const dayCounts=days.map(day=>({
    label:new Date(day).toLocaleDateString("en",{weekday:"short"}),
    count:users.filter(u=>{
      const d=u.createdAt?.toDate?.();
      return d&&d.toDateString()===day;
    }).length
  }));
  const maxCount=Math.max(...dayCounts.map(d=>d.count),1);

  return(<>
    {/* Stats grid */}
    <div className="stat-grid">
      {[
        {n:stats.total,   l:"Total Users",      c:"var(--pu)", glow:"rgba(167,139,250,.06)", icon:"👥"},
        {n:stats.today,   l:"Today's Signups",  c:"var(--gn)", glow:"rgba(16,185,129,.05)",  icon:"✨"},
        {n:stats.wfTotal, l:"Total Workflows",  c:"var(--cy)", glow:"rgba(34,211,238,.05)",  icon:"◈"},
        {n:stats.banned,  l:"Banned",           c:"var(--rd)", glow:"rgba(239,68,68,.05)",   icon:"🚫"},
      ].map(s=>(
        <div key={s.l} className="stat-card" style={{"--glow":s.glow}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <span style={{fontSize:18}}>{s.icon}</span>
          </div>
          <div className="stat-n" style={{color:s.c}}>{loading?"…":s.n}</div>
          <div className="stat-l">{s.l}</div>
        </div>
      ))}
    </div>

    {/* Signup chart */}
    <div className="section" style={{marginBottom:12}}>
      <div className="section-head">
        <span className="section-title">📈 Last 7 Days — Signups</span>
      </div>
      <div style={{padding:"14px"}}>
        {dayCounts.map(({label,count})=>(
          <div key={label} className="bar-row">
            <div style={{fontSize:10,color:"var(--t3)",width:32,flexShrink:0}}>{label}</div>
            <div className="bar-track">
              <div className="bar-fill" style={{width:`${(count/maxCount)*100}%`,background:"linear-gradient(90deg,var(--pu2),var(--pu))"}}/>
            </div>
            <div style={{fontSize:10,color:"var(--t2)",width:16,textAlign:"right",flexShrink:0}}>{count}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Recent users */}
    <div className="section">
      <div className="section-head">
        <span className="section-title">👥 Recent Users</span>
        <span style={{fontSize:10,color:"var(--t3)"}}>{users.length} total</span>
      </div>
      {loading
        ?<div className="empty">Loading…</div>
        :users.slice(0,6).map(u=>(
          <div key={u.uid} className="ucard-row" style={{padding:"10px 14px",borderBottom:"1px solid var(--b1)"}}>
            <div className="av" style={{background:`linear-gradient(135deg,hsl(${(u.email||"").charCodeAt(0)*7%360},60%,40%),hsl(${(u.email||"").charCodeAt(1)*11%360},70%,35%))`,width:30,height:30,fontSize:12}}>{(u.name||u.email||"?")[0].toUpperCase()}</div>
            <div style={{flex:1,minWidth:0,marginLeft:8}}>
              <div style={{fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{u.name||"—"}</div>
              <div style={{fontSize:10,color:"var(--t3)"}}>{u.email}</div>
            </div>
            {u.banned&&<span className="tag" style={{background:"rgba(239,68,68,.12)",color:"#f87171",border:"1px solid rgba(239,68,68,.2)"}}>BANNED</span>}
            <span style={{fontSize:10,color:"var(--t3)",marginLeft:6}}>{u.createdAt?.toDate?.().toLocaleDateString()||"—"}</span>
          </div>
        ))
      }
    </div>
  </>);
}

// ════════════════════════════
// USERS TAB
// ════════════════════════════
function Users({users,loading,onRefresh,showToast}){
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all"); // all | active | banned
  const [expanded,setExpanded]=useState(null);
  const [userWFs,setUserWFs]=useState({});
  const [wfLoading,setWFLoading]=useState(false);
  const [selectedUser,setSelectedUser]=useState(null);

  const filtered=users.filter(u=>{
    const q=search.toLowerCase();
    const matchQ=!q||(u.email||"").toLowerCase().includes(q)||(u.name||"").toLowerCase().includes(q)||(u.uid||"").toLowerCase().includes(q);
    const matchF=filter==="all"||(filter==="banned"&&u.banned)||(filter==="active"&&!u.banned);
    return matchQ&&matchF;
  });

  const loadWFs=async(uid)=>{
    if(userWFs[uid])return;
    setWFLoading(true);
    const wfs=await getUserWFs(uid);
    setUserWFs(p=>({...p,[uid]:wfs}));
    setWFLoading(false);
  };

  const toggleExpand=async(uid)=>{
    if(expanded===uid){setExpanded(null);}
    else{setExpanded(uid);await loadWFs(uid);}
  };

  const doBan=async(uid,ban)=>{
    try{
      await banUser(uid,ban);
      showToast(ban?"🚫 User banned":"✅ User unbanned");
      onRefresh();
    }catch(e){showToast("✕ "+e.message,"#ef4444");}
  };

  const doDelete=async(uid)=>{
    if(!confirm("এই user এবং তার সব workflow delete করবো?\n\nএটা undo করা যাবে না।"))return;
    try{
      await deleteUser(uid);
      showToast("🗑 User deleted");
      onRefresh();
    }catch(e){showToast("✕ "+e.message,"#ef4444");}
  };

  const doDeleteWF=async(uid,wfId,wfName)=>{
    if(!confirm(`"${wfName}" workflow delete করবো?`))return;
    try{
      await deleteWF(uid,wfId);
      setUserWFs(p=>({...p,[uid]:p[uid].filter(w=>w.id!==wfId)}));
      showToast("🗑 Workflow deleted");
    }catch(e){showToast("✕ "+e.message,"#ef4444");}
  };

  return(<>
    {/* Search & filter */}
    <input className="search-box" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Name, email বা UID দিয়ে খোঁজো…"/>
    <div style={{display:"flex",gap:5,marginBottom:10}}>
      {[["all","সবাই"],["active","Active"],["banned","Banned"]].map(([k,l])=>(
        <div key={k} onClick={()=>setFilter(k)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid",cursor:"pointer",fontSize:11,color:filter===k?"var(--pu)":
